source: https://www.microfocus.com/documentation/arcsight/arcsight-smartconnectors-25.1/cef-implementation-standard/Content/CEF/Chapter%202%20ArcSight%20Extension.htm
description: 'Predefined CEF extension keys from the ArcSight extension dictionary. Use these
  keys in the extension field whenever they match the data; add user-defined extensions only
  when no predefined key fits. audience: producer keys are set by devices and connectors that
  emit CEF; audience: consumer keys are set by ArcSight after ingestion and must not be set
  by event producers; audience: both marks the CEF 1.2 additions listed in both upstream tables.
  full_name is the expanded ArcSight field name; esm_groups names the ESM event schema groups
  (see catalog.yaml) that carry the field. since is the CEF specification version that introduced
  the key.'
