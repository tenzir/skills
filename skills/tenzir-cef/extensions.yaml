  esm_groups:
  - device
- key: deviceProcessName
  full_name: deviceProcessName
  type: string
  length: 1023
  audience: producer
  since: '0.1'
  description: Process name associated with the event. An example might be the process generating
    the syslog entry in UNIX.
  esm_groups:
  - device
- key: deviceTranslatedAddress
  full_name: deviceTranslatedAddress
  type: ipv4_address
  audience: producer
  since: '0.1'
  description: 'Identifies the translated device address that the event refers to in an IP
    network. The format is an IPv4 address. Example: “192.168.10.1”'
  esm_groups:
  - device
- key: dhost
  full_name: destinationHostName
  type: string
  length: 1023
  audience: producer
  since: '0.1'
  description: 'Identifies the destination that an event refers to in an IP network. The format
    must be a fully qualified domain name (FQDN) associated with the destination node, when
    a node is available. Examples: “host.domain.com” or “host”.'
  esm_groups:
  - destination
- key: dmac
  full_name: deviceMacAddress
  type: mac_address
  audience: producer
  since: '0.1'
  description: 'Six colon-separated hexadecimal numbers. Example: “00:0D:60:AF:1B:61”'
  notes: The upstream producer table lists dmac twice, in rows that differ only by a spelling
    fix in the description; the corrected row is kept.
  esm_groups:
  - device
- key: dntdom
  full_name: destinationNtDomain
  type: string
  length: 255
  audience: producer
  since: '0.1'
  description: The Windows domain name of the destination address.
  esm_groups:
  - destination
- key: dpid
  full_name: destinationProcessId
  type: integer
  audience: producer
  since: '0.1'
  description: Provides the ID of the destination process associated with the event. For example,
    if an event contains process ID 105, “105” is the process ID.
  esm_groups:
  - destination
- key: dpriv
  full_name: destinationUserPrivileges
  type: string
  length: 1023
  audience: producer
  since: '0.1'
  description: The typical values are “Administrator”, “User”, and “Guest”. This identifies
    the destination user’s privileges. In UNIX, for example, activity executed on the root
    user would be identified with destinationUser Privileges of “Administrator”.
  esm_groups:
  - destination
- key: dproc
  full_name: destinationProcessName
  type: string
  length: 1023
  audience: producer
  since: '0.1'
  description: 'The name of the event’s destination process. Example: “telnetd” or “sshd”.'
  esm_groups:
  - destination
- key: dpt
  full_name: destinationPort
  type: integer
  audience: producer
  since: '0.1'
  description: The valid port numbers are between 0 and 65535.
  esm_groups:
  - destination
- key: dst
  full_name: destinationAddress
  type: ipv4_address
  audience: producer
  since: '0.1'
  description: 'Identifies the destination address that the event refers to in an IP network.
    The format is an IPv4 address. Example: “192.168.10.1”'
  esm_groups:
  - destination
- key: dtz
  full_name: deviceTimeZone
  type: string
