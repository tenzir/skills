  - device
- key: deviceOutboundInterface
  full_name: deviceOutboundInterface
  type: string
  length: 128
  audience: producer
  since: '0.1'
  description: Interface on which the packet or data left the device.
  esm_groups:
  - device
- key: devicePayloadId
  full_name: devicePayloadId
  type: string
  length: 128
  audience: producer
  since: '0.1'
