  esm_groups:
  - device
- key: duid
  full_name: destinationUserId
  type: string
  length: 1023
  audience: producer
  since: '0.1'
  description: Identifies the destination user by ID. For example, in UNIX, the root user
    is generally associated with user ID 0.
  esm_groups:
  - destination
- key: duser
  full_name: destinationUserName
  type: string
  length: 1023
  audience: producer
  since: '0.1'
  description: Identifies the destination user by name. This is the user associated with the
    event’s destination. Email addresses are often mapped into the UserName fields. The recipient
    is a candidate to put into this field.
  esm_groups:
  - destination
- key: dvc
  full_name: deviceAddress
