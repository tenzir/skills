description: ArcSight ESM event schema groups. Every processed event is a flat record of data
  fields; each group page documents the fields of one schema area. Use the script alias, not
  the label, in filters, rules, and CEF full names. Data types are copied verbatim from the
  OpenText pages. The geographical and resource attribute suffixes that expand fields like
  attackerGeo* are documented in docs/field-suffixes.md.
