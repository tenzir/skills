name: user_account_change
title: User Account Change Data Model
version: 7.5.0
source_url: https://docs.fortinet.com/document/fortisiem/7.5.0/fortisiem-event-data-model/165823/user-account-change-data-model
doc: docs/user-account-change-data-model.md
summary: "This data model describes activities around user accounts and groups Accounts created/deleted/modified, Groups created/deleted/modified. Examples of Account Created Events: Win-Security-4720 \u2013 user account created, Win-Security-4741 \u2013 computer account created, Generic_Unix_User_Add, FortiGate-event-add-user, GitLab-User-created. Examples of Account Deleted Events: Win-Security-4726 \u2013 user account deleted, Win-Security-4743 \u2013 user account deleted, Generic_Unix_User_Del, FortiGate-event-admin-delete. Examples of Account Modified Events: Win-Security-4725 \u2013 user account disabled, Win-Security-4722 - user account enabled, Win-Security-4724 \u2013 password reset, Win-Security-4723 \u2013 password changed, Win-Security-4738 \u2013 user account changed, Win-Security-4742 \u2013 computer account changed, Win-Security-4781 \u2013 account name changed, Win-Security-4767 \u2013 account unlocked, Generic_Unix_User_Change_Name, Generic_Unix_Password_Change, Generic_Unix_Failed_Password_Change, Generic_Unix_User_Change_Home, Generic_Unix_User_Password_Change, Generic_Unix_User_Change_GID, Generic_Unix_User_Change_Shell, FortiGate-event-password-change, FortiGate-event-admin-settings-edit. Examples of Group Created Events: Win-Security-4727 \u2013 Windows security enabled global group created, Win-Security-4731 \u2013 Windows security enabled local group created, Win-Security-4744 \u2013 Windows security enabled universal global group created, Generic_Unix_Group_Add, FortiGate-event-user-group-change. Examples of Group Deleted Events: Win-Security-4730 \u2013 Windows security enabled global group deleted, Win-Security-4734 \u2013 Windows security enabled local group deleted, Win-Security-4758 \u2013 Windows security enabled universal global group deleted, Generic_Unix_Group_Del. Examples of Group Modified Events: Win-Security-4728 \u2013 Windows security enabled global group member added, Win-Security-4732\u2013 Windows security enabled local group member added, Win-Security-4756 \u2013 Windows security enabled universal global group member added, Win-Security-4729 \u2013 Windows security enabled global group member removed, Win-Security-4733\u2013 Windows security enabled local group member removed, Win-Security-4757 \u2013 Windows security enabled universal global group member removed. In addition to the base event attributes, the following attributes are relevant and may be populated in this data model."
attributes:
- name: hostIpAddr
  type: IP
  display_name: Host IP
  description: IP address of hostName
- name: hostName
  type: string
  display_name: Host Name
  description: Host where event occurs
- name: user
  type: string
  display_name: User
  description: User whose took action
- name: domain
  type: string
  display_name: Domain
  description: Domain of User
- name: targetUser
  type: string
  display_name: Target User
  description: Affected User whose account was created/deleted/modified
- name: targetDomain
  type: string
  display_name: Target User Domain
  description: Domain of targetUser
- name: targetUserGrp
  type: string
  display_name: Target User Group
  description: Group that was created/deleted
