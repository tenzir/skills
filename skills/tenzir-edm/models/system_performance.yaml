- name: intfName
  type: string
  display_name: Host Interface Name
  description: Name of a network interface in a host.
  section: Network Interface Monitoring
- name: isHostIntfCritical
  type: string
  display_name: Host Interface Critical
  description: Yes if the interface is Critical; no if it is not.
  section: Network Interface Monitoring
- name: isHostIntfWAN
  type: string
  display_name: Interface WAN Flag
  description: Yes if the interface is WAN interface; no if it is not.
  section: Network Interface Monitoring
- name: intfInSpeed64
  type: uint64
  display_name: Recv Interface Speed bps
  description: High Speed Network Interface Speed (bits/sec).
  section: Network Interface Monitoring
- name: intfOutSpeed64
  type: uint64
  display_name: Sent Interface Speed bps
  description: High Speed Network Interface Speed (bits/sec).
  section: Network Interface Monitoring
- name: intfAdminStatus
  type: string
  display_name: Interface Admin Status
  description: "Interface Administrative Status \u2013 Up or Down"
  section: Network Interface Monitoring
- name: intfOperStatus
  type: string
  display_name: Interface Operational Status
  description: "Interface Operational Status \u2013 Up or Down"
  section: Network Interface Monitoring
- name: inIntfUtil
  type: double
  display_name: Recv Interface Util
  description: Ratio of Received Bits per second (derived from recvBytes) to the received network interface speed
  section: Network Interface Monitoring
- name: outIntfUtil
  type: double
  display_name: Sent Interface Util
  description: Ratio of Sent Bits per second (derived from sentBytes) to the sent network interface speed
  section: Network Interface Monitoring
- name: inIntfPktErr
  type: uint32
  display_name: Recv Packet Errors
  description: Number of received packets that had errors. The networking stack discards these packets.
  section: Network Interface Monitoring
- name: outIntfPktErr
  type: uint32
  display_name: Sent Packet Errors
  description: Number of sent packets that had errors. he networking stack discards these packets.
  section: Network Interface Monitoring
- name: inIntfPktErrPct
  type: double
  display_name: Recv Packet Error Pct
  description: Ratio of inIntfPktErr and the total number of received packets in an onterval
  section: Network Interface Monitoring
- name: outIntfPktErrPct
  type: double
  display_name: Sent Packet Error Pct
  description: Ratio of outIntfPktErr and the total number of received packets in an onterval
  section: Network Interface Monitoring
- name: inIntfPktDiscarded
  type: uint32
  display_name: Recv Packet Discards
  description: Total number of received packets that were discarded by the networking stack.
  section: Network Interface Monitoring
- name: outIntfPktDiscarded
  type: uint32
  display_name: Sent Packet Discards
  description: Total number of sent packets that were discarded by the networking stack.
  section: Network Interface Monitoring
- name: inIntfPktDiscardedPct
  type: double
  display_name: Recv Packet Discard Pct
  description: Ratio of inIntfPktDiscarded on an interface to the total number of received packets on that interface
  section: Network Interface Monitoring
- name: outIntfPktDiscardedPct
  type: double
  display_name: Sent Packet Discard Pct
  description: Ratio of outIntfPktDiscarded on an interface to the total number of sent packets on that interface
  section: Network Interface Monitoring
- name: hostIpAddr
  type: IP
  display_name: Host IP
  description: IP address of hostName
  section: Uptime Monitoring
- name: hostName
  type: string
  display_name: Host Name
  description: Host where event occurs
  section: Uptime Monitoring
- name: sysUpTime
