name: system_performance
title: System Performance Data Model
version: 7.5.0
source_url: https://docs.fortinet.com/document/fortisiem/7.5.0/fortisiem-event-data-model/326870/system-performance-data-model
doc: docs/system-performance-data-model.md
summary: "This data model describes system performance monitoring metrics collected by FortiSIEM's own device monitoring. The following events follow this data model \u2013 covers all device types: Windows, Linux and network devices: PH_DEV_MON_SYS_UPTIME (Uptime monitoring), PH_DEV_MON_SYS_CPU_UTIL (CPU monitoring), PH_DEV_MON_SYS_PER_CPU_UTIL (CPU monitoring for each CPU), PH_DEV_MON_SYS_MEM_UTIL (memory monitoring), PH_DEV_MON_SYS_VIRT_MEM_UTIL (virtual memory monitoring), PH_DEV_MON_SYS_DISK_UTIL (disk space monitoring), PH_DEV_MON_DISK_IO_UTIL (Disk I/O Monitoring), PH_DEV_MON_SYS_PAGEFILE_USAGE (windows page file monitoring), PH_DEV_MON_NET_INTF_UTIL (Network interface utilization monitoring). In addition to the base event attributes, the following attributes are relevant and may be populated in this data model."
attributes:
- name: hostIpAddr
  type: IP
  display_name: Host IP
  description: IP address of hostName
  section: CPU Monitoring
- name: hostName
  type: string
  display_name: Host Name
  description: Host where event occurs
  section: CPU Monitoring
- name: cpuName
  type: string
  display_name: CPU Name
  description: CPU name (CPU-1, CPU-2) etc for multi-CPU monitoring
  section: CPU Monitoring
- name: cpuUtil
  type: double
  display_name: CPU Util
  description: CPU Util (0-100)
  section: CPU Monitoring
- name: sysCpuUtil
  type: double
  display_name: System CPU Util
  description: Linux System CPU Util (0-100)
  section: CPU Monitoring
- name: userCpuUtil
  type: double
  display_name: User CPU Util
  description: Linux User CPU Util (0-100)
  section: CPU Monitoring
- name: hostIpAddr
  type: IP
  display_name: Host IP
  description: IP address of hostName
  section: Disk I/O Monitoring
- name: hostName
  type: string
  display_name: Host Name
  description: Host where event occurs
  section: Disk I/O Monitoring
