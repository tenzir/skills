name: dns_activity
title: DNS Activity Data Model
version: 7.5.0
source_url: https://docs.fortinet.com/document/fortisiem/7.5.0/fortisiem-event-data-model/773915/dns-activity-data-model
doc: docs/dns-activity-data-model.md
summary: 'This data model can be used to describe DNS name resolution activity, including both FQDN -> IP and IP -> FQDN resolutions. Examples from BIND BIND_DNS_A_Query, BIND_DNS_PTR_Query. Examples from Cisco Umbrella: CiscoUmbrella-DNS-AAAA-Query-allowed, CiscoUmbrella-DNS-AAAA-Query-blocked, CiscoUmbrella-DNS-A-Query-allowed, CiscoUmbrella-DNS-A-Query-blocked, CiscoUmbrella-DNS-PTR-Query-allowed, CiscoUmbrella-DNS-PTR-Query-blocked. Examples from FortiSIEM Windows Agent (DNS DebugLogs) AO-WUA-DNS-A-Query-Success, AO-WUA-DNS-A-Query-Failed, AO-WUA-DNS-PTR-Query-Success, AO-WUA-DNS-PTR-Query-Failed, AO-WUA-DNS-AAAA-Query-Success, AO-WUA-DNS-AAAA-Query-Failed. Examples from Microsoft DNS: MS_DNS_A_Success, MS_DNS_A_Fail, MS_DNS_AAAA_Success, MS_DNS_AAAA_Fail, MS_DNS_PTR_Success, MS_DNS_PTR_Fail. Examples from other devices: FortiGate-dns-query. In addition to the base event attributes, the following attributes are relevant and may be populated in this data model.'
attributes:
- name: srcIpAddr
  type: IP
  display_name: Source IP
  description: Source IP of a device as identified in the event.
- name: destIpAddr
  type: IP
  display_name: Destination IP
  description: Destination IP of a device as identified in the event.
- name: destName
  type: string
  display_name: Destination Host Name
  description: Destination device's hostname as identified in the log, can also be enriched using reverse lookup of the destination IP address.
- name: sentBytes64
  type: uint64
  display_name: Sent Bytes64
  description: Number of bytes sent by a host. This has 64bit resolution.
- name: recvBytes64
  type: uint64
  display_name: Received Bytes64
  description: Number of bytes received by a host. This has 64bit resolution.
- name: totBytes64
  type: uint64
  display_name: Total Bytes64
  description: Total number of sent and received bytes by a host. This has 64bit resolution.
- name: dnsQueryType
  type: string
  display_name: DNS Query Type
  description: This is the DNS query record type such as A, AAA, PTR, etc.
- name: dnsResponseCode
  type: uint16
  display_name: DNS Response Code
- name: dnsQueryName
  type: string
  display_name: DNS Query Name
  description: This is the name the dns client queried the DNS server to resolve.
- name: dnsQueryClass
  type: string
  display_name: DNS Query Class
  description: DNS Query Class
