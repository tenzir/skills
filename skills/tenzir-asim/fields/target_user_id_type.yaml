- name: ProcessEvent
  role: target
  class: Conditional
  type: UserIdType
  description: The type of the ID stored in the TargetUserId field. For a list of allowed values and further information refer to UserIdType in the Schema Overview article.
- name: UserManagement
  role: target
  class: Conditional
  type: Enumerated
  allowed_values:
