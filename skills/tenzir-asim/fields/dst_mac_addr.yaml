name: DstMacAddr
summary: The MAC address of the network interface used for the connection or session by the destination device.
schemas:
- name: NetworkSession
  role: destination
  class: Optional
  type: MAC Address (String)
  description: The MAC address of the network interface used for the connection or session by the destination device.
  examples:
  - 06:10:9f:eb:8f:14
  - 00:1B:44:11:3A:B7
