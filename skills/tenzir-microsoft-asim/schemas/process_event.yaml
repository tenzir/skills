name: ProcessEvent
title: Process Event
kind: event
version: 0.1.4
status: GA
summary: The Process Event normalization schema is used to describe the operating system activity of running and terminating a process. Such events are reported by operating systems and security systems, such as EDR (End Point Detection and Response) systems. A process, as defined by OSSEM, is a containment and management object that represents a running instance of a program. While processes themselves do not run, they do manage threads that run and execute code. For more information about normalization in Microsoft Sentinel, see Normalization and the Advanced Security Information Model (ASIM).
fields:
- name: ActingProcessId
  role: acting
  class: Mandatory
  type: String
  description: The process ID (PID) of the acting process.
  examples:
  - '48610176'
  notes: The type is defined as string to support varying systems, but on Windows and Linux this value must be numeric. If you are using a Windows or Linux machine and used a different type, make sure to convert the values. For example, if you used a hexadecimal value, convert it to a decimal value.
- name: ActorUsername
  role: actor
  class: Mandatory
  type: Username (String)
  description: The Actor username, including domain information when available. For the supported format for different ID types, refer to the User entity. Use the simple form only if domain information isn't available. Store the Username type in the ActorUsernameType field. If other username formats are available, store them in the fields ActorUsername.
  examples:
  - AlbertE
- name: Dvc
  role: device
  class: Mandatory
  type: String
  to:
  - DvcFQDN
  - DvcHostname
  - DvcId
  - DvcIpAddr
  description: For process activity events, device fields refer to the system on which the process was executed.
- name: EventCount
  role: common
  class: Mandatory
  type: Integer
  description: The number of events described by the record. This value is used when the source supports aggregation, and a single record might represent multiple events. For other sources, set to 1.
- name: EventEndTime
  role: common
  class: Mandatory
  type: Date/time
  to:
  - TimeGenerated
  description: The time when the event ended. If the source supports aggregation and the record represents multiple events, the time that the last event was generated. If not provided by the source record, this field aliases the TimeGenerated field.
- name: EventProduct
  role: common
  class: Mandatory
  type: String
  description: The product generating the event. The value should be one of the values listed in Vendors and Products.
  examples:
  - Sysmon
- name: EventResult
  role: common
  class: Mandatory
  type: Enumerated
  description: 'One of the following values: Success, Partial, Failure, NA (Not Applicable). The value might be provided in the source record by using different terms, which should be normalized to these values. Alternatively, the source might provide only the EventResultDetails field, which should be analyzed to derive the EventResult value.'
  examples:
  - Success
- name: EventSchema
  role: common
  class: Mandatory
  type: String
  value: ProcessEvent
  description: The name of the schema documented here is ProcessEvent.
- name: EventSchemaVersion
  role: common
  class: Mandatory
  type: SchemaVersion (String)
  value: 0.1.4
  description: The version of the schema. The version of the schema documented here is 0.1.4
- name: EventStartTime
  role: common
  class: Mandatory
  type: Date/time
  to:
  - TimeGenerated
  description: The time when the event started. If the source supports aggregation and the record represents multiple events, the time that the first event was generated. If not provided by the source record, this field aliases the TimeGenerated field.
- name: EventType
  role: common
  class: Mandatory
  type: Enumerated
  allowed_values:
  - ProcessCreated
  - ProcessTerminated
  description: 'Describes the operation reported by the record. For Process records, supported values include: - ProcessCreated - ProcessTerminated'
- name: EventVendor
  role: common
  class: Mandatory
  type: String
  description: The vendor of the product generating the event. The value should be one of the values listed in Vendors and Products.
  examples:
  - Microsoft
- name: TargetProcessCommandLine
  role: target
  class: Mandatory
  type: String
  description: The command line used to run the target process.
  examples:
  - '"choco.exe" -v'
- name: TargetProcessId
  role: target
  class: Mandatory
  type: String
  description: The process ID (PID) of the target process.
  examples:
  - '48610176'
  notes: The type is defined as string to support varying systems, but on Windows and Linux this value must be numeric. If you are using a Windows or Linux machine and used a different type, make sure to convert the values. For example, if you used a hexadecimal value, convert it to a decimal value.
- name: TargetProcessName
  role: target
  class: Mandatory
  type: string
  description: The name of the target process. This name is commonly derived from the image or executable file that's used to define the initial code and data that's mapped into the process' virtual address space.
  examples:
  - C:\Windows\explorer.exe
- name: ActorUserId
  role: actor
  class: Recommended
  type: String
  description: A machine-readable, alphanumeric, unique representation of the Actor. For the supported format for different ID types, refer to the User entity.
  examples:
  - S-1-12
- name: DvcAction
  role: device
  class: Recommended
  type: String
  description: For reporting security systems, the action taken by the system, if applicable.
  examples:
  - Blocked
- name: DvcDomain
  role: device
  class: Recommended
  type: Domain (String)
  description: The domain of the device on which the event occurred or which reported the event, depending on the schema.
  examples:
  - Contoso
- name: DvcDomainType
  role: device
  class: Recommended
  type: Enumerated
  required_if:
  - the DvcDomain field is used
  description: The type of DvcDomain. For a list of allowed values and further information, refer to DomainType.
  notes: This field is required if the DvcDomain field is used.
- name: DvcFQDN
  role: device
  class: Recommended
  type: FQDN (String)
  description: The hostname of the device on which the event occurred or which reported the event, depending on the schema.
  examples:
  - Contoso\DESKTOP-1282V4D
  notes: This field supports both traditional FQDN format and Windows domain\hostname format. The DvcDomainType field reflects the format used.
- name: DvcHostname
  role: device
  class: Recommended
  type: Hostname
  description: The hostname of the device on which the event occurred or which reported the event, depending on the schema.
  examples:
  - ContosoDc
- name: DvcId
  role: device
  class: Recommended
  type: String
  description: The unique ID of the device on which the event occurred or which reported the event, depending on the schema. If multiple IDs are available, use the first one from the list, and store the others by using the field names DvcAzureResourceId, DvcMDEid, etc.
  examples:
  - 41502da5-21b7-48ec-81c9-baeea8d7d669
- name: DvcIdType
  role: device
  class: Recommended
  type: Enumerated
  required_if:
  - the DvcId field is used
  allowed_values:
  - AzureResourceId
  - MDEid
  - MD4IoTid
  - VMConnectionId
  - AwsVpcId
  - VectraId
  - AppGateId
  - FQDN
  - Other
  description: The type of DvcId. The list of allowed values is AzureResourceId, MDEid, MD4IoTid, VMConnectionId, AwsVpcId, VectraId, AppGateId, FQDN, and Other. Using FQDN as a device ID, implies reusing the hostname. Use it only as a last resort.
  notes: This field is required if the DvcId field is used.
- name: DvcIpAddr
  role: device
  class: Recommended
  type: IP address
  description: The IP address of the device on which the event occurred or which reported the event, depending on the schema.
  examples:
  - 45.21.42.12
- name: EventResultDetails
  role: common
  class: Recommended
  type: Enumerated
  description: Reason or details for the result reported in the EventResult field. Each schema documents the list of values valid for this field. The original, source specific, value is stored in the EventOriginalResultDetails field.
  examples:
  - NXDOMAIN
- name: EventSeverity
  role: common
  class: Recommended
  type: Enumerated
  description: 'The severity of the event. Valid values are: Informational, Low, Medium, or High.'
- name: EventUid
  role: common
  class: Recommended
  type: String
  description: The unique ID of the record, as assigned by Microsoft Sentinel. This field is typically mapped to the _ItemId Log Analytics field.
- name: ParentProcessId
  role: process
  class: Recommended
  type: String
  description: The process ID (PID) of the parent process.
  examples:
  - '48610176'
- name: TargetProcessCreationTime
  role: target
  class: Recommended
  type: DateTime
  description: The product version from the version information of the target process image file.
- name: TargetUserId
  role: target
  class: Recommended
  type: String
  description: A machine-readable, alphanumeric, unique representation of the target user. For the supported format for different ID types, refer to the User entity.
  examples:
  - S-1-12
- name: ActorUserIdType
  role: actor
  class: Conditional
  type: Enumerated
  description: The type of the ID stored in the ActorUserId field. For a list of allowed values and further information refer to UserIdType in the Schema Overview article.
- name: ActorUsernameType
  role: actor
  class: Conditional
  type: Enumerated
  description: Specifies the type of the user name stored in the ActorUsername field. For a list of allowed values and further information refer to UsernameType in the Schema Overview article.
  examples:
  - Windows
- name: HashType
  class: Conditional
  type: Enumerated
  to:
  - IMPHASH
  - MD5
  - SHA
  - SHA256
  - SHA512
  allowed_values:
  - MD5
  - SHA
  - SHA256
  - SHA512
  - IMPHASH
  description: The type of hash stored in the HASH alias field, allowed values are MD5, SHA, SHA256, SHA512 and IMPHASH.
- name: Rule
  role: rule
  class: Conditional
  type: String
  description: Either the value of kRuleName or the value of RuleNumber. If the value of RuleNumber is used, the type should be converted to string.
- name: TargetUserIdType
  role: target
  class: Conditional
  type: UserIdType
  description: The type of the ID stored in the TargetUserId field. For a list of allowed values and further information refer to UserIdType in the Schema Overview article.
- name: TargetUsernameType
  role: target
  class: Conditional
  type: Enumerated
  description: Specifies the type of the user name stored in the TargetUsername field. For a list of allowed values and further information refer to UsernameType in the Schema Overview article.
  examples:
  - Windows
- name: ActingProcessCommandLine
  role: acting
  class: Optional
  type: String
  description: The command line used to run the acting process.
  examples:
  - '"choco.exe" -v'
- name: ActingProcessCreationTime
  role: acting
  class: Optional
  type: DateTime
  description: The date and time when the acting process was started.
- name: ActingProcessFileCompany
  role: acting
  class: Optional
  type: String
  description: The company that created the acting process image file.
  examples:
  - Microsoft
- name: ActingProcessFileDescription
  role: acting
  class: Optional
  type: String
  description: The description embedded in the version information of the acting process image file.
  examples:
  - 'Notepad++ : a free (GPL) source code editor'
- name: ActingProcessFileInternalName
  role: acting
  class: Optional
  type: String
  description: The product internal file name from the version information of the acting process image file.
- name: ActingProcessFilename
  role: acting
  class: Optional
  type: String
  description: The file name part of the ActingProcessName, without folder information.
  examples:
  - explorer.exe
- name: ActingProcessFileOriginalName
  role: acting
  class: Optional
  type: String
  description: The product original file name from the version information of the acting process image file.
  examples:
  - Notepad++.exe
- name: ActingProcessFileProduct
  role: acting
  class: Optional
  type: String
  description: The product name from the version information in the acting process image file.
  examples:
  - Notepad++
- name: ActingProcessFileSize
  role: acting
  class: Optional
  type: Long
  description: The size of the file that ran the acting process.
- name: ActingProcessFileVersion
  role: acting
  class: Optional
  type: String
  description: The product version from the version information of the acting process image file.
  examples:
  - 7.9.5.0
- name: ActingProcessGuid
  role: acting
  class: Optional
  type: GUID (string)
  description: A generated unique identifier (GUID) of the acting process. Enables identifying the process across systems.
  examples:
  - EF3BD0BD-2B74-60C5-AF5C-010000001E00
  - 01234567-89AB-CDEF-0123-456789ABCDEF
- name: ActingProcessIMPHASH
  role: acting
  class: Optional
  type: String
  description: The Import Hash of all the library DLLs that are used by the acting process.
- name: ActingProcessInjectedAddress
  role: acting
  class: Optional
  type: String
  description: The memory address in which the responsible acting process is stored.
- name: ActingProcessIntegrityLevel
  role: acting
  class: Optional
  type: String
  description: 'Every process has an integrity level that is represented in its token. Integrity levels determine the process level of protection or access. Windows defines the following integrity levels: low, medium, high, and system. Standard users receive a medium integrity level and elevated users receive a high integrity level. For more information, see Mandatory Integrity Control - Win32 apps.'
- name: ActingProcessIsHidden
  role: acting
  class: Optional
  type: Boolean
  description: An indication of whether the acting process is in hidden mode.
- name: ActingProcessMD5
  role: acting
  class: Optional
  type: String
  description: The MD5 hash of the acting process image file.
  examples:
  - 75a599802f1fa166cdadb360960b1dd0
- name: ActingProcessName
  role: acting
  class: Optional
  type: string
  description: The name of the acting process. This name is commonly derived from the image or executable file that's used to define the initial code and data that's mapped into the process' virtual address space.
  examples:
  - C:\Windows\explorer.exe
- name: ActingProcessSHA1
  role: acting
  class: Optional
  type: SHA1
  description: The SHA-1 hash of the acting process image file.
  examples:
  - d55c5a4df19b46db8c54c801c4665d3338acdab0
- name: ActingProcessSHA256
  role: acting
  class: Optional
  type: SHA256
  description: The SHA-256 hash of the acting process image file. 2e1ec8cbb00b22629d2899f7c68da274
  examples:
  - e81bb824c4a09a811af17deae22f22dd
- name: ActingProcessSHA512
  role: acting
  class: Optional
  type: SHA512
  description: The SHA-512 hash of the acting process image file.
- name: ActingProcessTokenElevation
  role: acting
  class: Optional
  type: String
  description: A token indicating the presence or absence of User Access Control (UAC) privilege elevation applied to the acting process.
  examples:
  - None
- name: ActorOriginalUserType
  role: actor
  class: Optional
  type: String
  description: The original destination user type, if provided by the reporting device.
- name: ActorScope
  role: actor
  class: Optional
  type: String
  description: The scope, such as Microsoft Entra tenant, in which ActorUserId and ActorUsername are defined. or more information and list of allowed values, see UserScope in the Schema Overview article.
- name: ActorScopeId
  role: actor
  class: Optional
  type: String
  description: The scope ID, such as Microsoft Entra Directory ID, in which ActorUserId and ActorUsername are defined. or more information and list of allowed values, see UserScopeId in the Schema Overview article.
- name: ActorSessionId
  role: actor
  class: Optional
  type: String
  description: The unique ID of the login session of the Actor.
  examples:
  - '999'
  notes: The type is defined as string to support varying systems, but on Windows this value must be numeric. If you are using a Windows machine and used a different type, make sure to convert the values. For example, if you used a hexadecimal value, convert it to a decimal value.
- name: ActorUserType
  role: actor
  class: Optional
  type: UserType
  description: The type of Actor. For a list of allowed values and further information refer to UserType in the Schema Overview article.
  notes: The value might be provided in the source record by using different terms, which should be normalized to these values. Store the original value in the ActorOriginalUserType field.
- name: AdditionalFields
  role: common
  class: Optional
  type: Dynamic
  description: If your source provides additional information worth preserving, either keep it with the original field names or create the dynamic AdditionalFields field, and add the extra information as key/value pairs.
- name: DvcDescription
  role: device
  class: Optional
  type: String
  description: A descriptive text associated with the device.
  examples:
  - Primary Domain Controller
- name: DvcInterface
  role: device
  class: Optional
  type: String
  description: The network interface on which data was captured. This field is typically relevant to network related activity, which is captured by an intermediate or tap device.
- name: DvcMacAddr
  role: device
  class: Optional
  type: MAC address
  description: The MAC address of the device on which the event occurred or which reported the event.
  examples:
  - 00:1B:44:11:3A:B7
- name: DvcOriginalAction
  role: device
  class: Optional
  type: String
