  class: Optional
  type: String
  description: 'Every process has an integrity level that is represented in its token. Integrity levels determine the process level of protection or access. Windows defines the following integrity levels: low, medium, high, and system. Standard users receive a medium integrity level and elevated users receive a high integrity level. For more information, see Mandatory Integrity Control - Win32 apps.'
- name: TargetProcessIsHidden
  role: target
  class: Optional
  type: Boolean
  description: An indication of whether the target process is in hidden mode.
- name: TargetProcessMD5
  role: target
  class: Optional
  type: MD5
  description: The MD5 hash of the target process image file.
  examples:
  - 75a599802f1fa166cdadb360960b1dd0
- name: TargetProcessSHA1
  role: target
  class: Optional
  type: SHA1
  description: The SHA-1 hash of the target process image file.
  examples:
  - d55c5a4df19b46db8c54c801c4665d3338acdab0
- name: TargetProcessSHA256
  role: target
  class: Optional
  type: SHA256
  description: The SHA-256 hash of the target process image file. 2e1ec8cbb00b22629d2899f7c68da274
  examples:
  - e81bb824c4a09a811af17deae22f22dd
- name: TargetProcessSHA512
  role: target
  class: Optional
  type: SHA512
  description: The SHA-512 hash of the target process image file.
- name: TargetProcessStatusCode
  role: target
  class: Optional
  type: String
  description: The exit code returned by the target process when terminated. This field is valid only for process termination events. For consistency, the field type is string, even if value provided by the operating system is numeric.
- name: TargetProcessTokenElevation
  role: target
  class: Optional
  type: String
  description: Token type indicating the presence or absence of User Access Control (UAC) privilege elevation applied to the process that was created or terminated.
  examples:
  - None
- name: TargetUserScope
  role: target
  class: Optional
  type: String
  description: The scope, such as Microsoft Entra tenant, in which TargetUserId and TargetUsername are defined. or more information and list of allowed values, see UserScope in the Schema Overview article.
- name: TargetUserScopeId
  role: target
  class: Optional
  type: String
  description: The scope ID, such as Microsoft Entra Directory ID, in which TargetUserId and TargetUsername are defined. for more information and list of allowed values, see UserScopeId in the Schema Overview article.
- name: TargetUserSessionGuid
  role: target
  class: Optional
  type: String
  description: The unique GUID of the target user's login session, as reported by the reporting device.
  examples:
  - '{12345678-1234-1234-1234-123456789012}'
- name: TargetUserSessionId
  role: target
  class: Optional
  type: String
  description: The unique ID of the target user's login session.
  examples:
  - '999'
  notes: The type is defined as string to support varying systems, but on Windows this value must be numeric. If you are using a Windows or Linux machine and used a different type, make sure to convert the values. For example, if you used a hexadecimal value, convert it to a decimal value.
- name: TargetUserType
  role: target
  class: Optional
  type: UserType
  description: The type of Actor. For a list of allowed values and further information refer to UserType in the Schema Overview article.
  notes: The value might be provided in the source record by using different terms, which should be normalized to these values. Store the original value in the TargetOriginalUserType field.
- name: ThreatCategory
  role: threat
  class: Optional
  type: String
  description: The category of the threat or malware identified in the file activity.
  examples:
  - Trojan
- name: ThreatConfidence
  role: threat
  class: Optional
  type: ConfidenceLevel (Integer)
  description: The confidence level of the threat identified, normalized to a value between 0 and a 100.
- name: ThreatField
  role: threat
  class: Optional
  type: String
  description: The field for which a threat was identified.
- name: ThreatFirstReportedTime
  role: threat
  class: Optional
  type: datetime
  description: The first time the IP address or domain were identified as a threat.
- name: ThreatId
  role: threat
  class: Optional
  type: String
  description: The ID of the threat or malware identified in the file activity.
- name: ThreatIsActive
  role: threat
  class: Optional
  type: Boolean
  description: True if the threat identified is considered an active threat.
- name: ThreatLastReportedTime
  role: threat
  class: Optional
  type: datetime
  description: The last time the IP address or domain were identified as a threat.
- name: ThreatName
  role: threat
  class: Optional
  type: String
  description: The name of the threat or malware identified in the file activity.
  examples:
  - EICAR Test File
- name: ThreatOriginalConfidence
  role: threat
  class: Optional
  type: String
  description: The original confidence level of the threat identified, as reported by the reporting device.
- name: ThreatOriginalRiskLevel
  role: threat
  class: Optional
  type: String
  description: The risk level as reported by the reporting device.
- name: ThreatRiskLevel
  role: threat
  class: Optional
  type: RiskLevel (Integer)
  description: The risk level associated with the identified threat. The level should be a number between 0 and 100.
  notes: The value might be provided in the source record by using a different scale, which should be normalized to this scale. The original value should be stored in ThreatOriginalRiskLevel.
- name: CommandLine
  role: process
  class: Alias
  to:
  - TargetProcessCommandLine
- name: Hash
  role: file
  class: Alias
  resolution: Alias to the best available hash for the target process.
- name: Process
  role: process
  class: Alias
  to:
  - ProcessName
  - TargetProcessName
  examples:
  - C:\Windows\System32\rundll32.exe
- name: User
  role: user
  class: Alias
  to:
  - TargetUsername
  examples:
  - CONTOSO\dadmin
- name: TargetUsername
  role: target
  class: Mandatory for process create events.
  type: Username (String)
  description: The target username, including domain information when available. For the supported format for different ID types, refer to the User entity. Use the simple form only if domain information isn't available. Store the Username type in the TargetUsernameType field. If other username formats are available, store them in the fields TargetUsername.
  examples:
  - AlbertE
