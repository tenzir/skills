name: HttpUserAgent
summary: When authentication is performed over HTTP or HTTPS, this field's value is the user_agent HTTP header provided by the acting application when performing the authentication.
schemas:
- name: AuditEvent
  role: http
  class: Optional
  type: String
  description: When authentication is performed over HTTP or HTTPS, this field's value is the user_agent HTTP header provided by the acting application when performing the authentication.
  examples:
  - Mozilla/5.0 (iPhone; CPU iPhone OS 12_1 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/12.0 Mobile/15E148 Safari/604.1
- name: Authentication
  role: http
  class: Optional
  type: String
  description: When authentication is performed over HTTP or HTTPS, this field's value is the user_agent HTTP header provided by the acting application when performing the authentication.
  examples:
  - Mozilla/5.0 (iPhone; CPU iPhone OS 12_1 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/12.0 Mobile/15E148 Safari/604.1
- name: FileEvent
  role: http
  class: Optional
  type: String
  description: When the operation is initiated by a remote system using HTTP or HTTPS, the user agent used. AppleWebKit/537.36 (KHTML, like Gecko) Chrome/42.0.2311.135 Safari/537.36 Edge/12.246
  examples:
  - Mozilla/5.0 (Windows NT 10.0; Win64; x64)
- name: UserManagement
  role: http
  class: Optional
  type: String
  description: When authentication is performed over HTTP or HTTPS, this field's value is the user_agent HTTP header provided by the acting application when performing the authentication.
  examples:
  - Mozilla/5.0 (iPhone; CPU iPhone OS 12_1 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/12.0 Mobile/15E148 Safari/604.1
- name: WebSession
  role: http
  class: Optional
  type: String
  description: The HTTP user agent header. AppleWebKit/537.36 (KHTML, like Gecko) Chrome/83.0.4103.97 Safari/537.36
  examples:
  - Mozilla/5.0
