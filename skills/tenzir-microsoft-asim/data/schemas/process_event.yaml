- name: ActorUserIdType
  role: actor
  class: Conditional
  type: Enumerated
  description: The type of the ID stored in the ActorUserId field. For a list of allowed values and further information refer to UserIdType in the Schema Overview article.
- name: ActorUsernameType
  role: actor
  class: Conditional
  type: Enumerated
  description: Specifies the type of the user name stored in the ActorUsername field. For a list of allowed values and further information refer to UsernameType in the Schema Overview article.
  examples:
  - Windows
- name: HashType
  class: Conditional
  type: Enumerated
  to:
  - IMPHASH
  - MD5
  - SHA
  - SHA256
  - SHA512
  allowed_values:
  - MD5
  - SHA
  - SHA256
  - SHA512
  - IMPHASH
  description: The type of hash stored in the HASH alias field, allowed values are MD5, SHA, SHA256, SHA512 and IMPHASH.
- name: Rule
  role: rule
  class: Conditional
  type: String
  description: Either the value of kRuleName or the value of RuleNumber. If the value of RuleNumber is used, the type should be converted to string.
- name: TargetUserIdType
  role: target
  class: Conditional
  type: UserIdType
  description: The type of the ID stored in the TargetUserId field. For a list of allowed values and further information refer to UserIdType in the Schema Overview article.
- name: TargetUsernameType
  role: target
  class: Conditional
  type: Enumerated
  description: Specifies the type of the user name stored in the TargetUsername field. For a list of allowed values and further information refer to UsernameType in the Schema Overview article.
