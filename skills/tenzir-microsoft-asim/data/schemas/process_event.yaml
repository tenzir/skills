name: ProcessEvent
title: Process Event
kind: event
version: 0.1.4
status: GA
summary: The Process Event normalization schema is used to describe the operating system activity of running and terminating a process. Such events are reported by operating systems and security systems, such as EDR (End Point Detection and Response) systems. A process, as defined by OSSEM, is a containment and management object that represents a running instance of a program. While processes themselves do not run, they do manage threads that run and execute code. For more information about normalization in Microsoft Sentinel, see Normalization and the Advanced Security Information Model (ASIM).
fields:
- name: ActingProcessId
  role: acting
  class: Mandatory
  type: String
  description: The process ID (PID) of the acting process.
  examples:
  - '48610176'
  notes: The type is defined as string to support varying systems, but on Windows and Linux this value must be numeric. If you are using a Windows or Linux machine and used a different type, make sure to convert the values. For example, if you used a hexadecimal value, convert it to a decimal value.
- name: ActorUsername
  role: actor
  class: Mandatory
  type: Username (String)
  description: The Actor username, including domain information when available. For the supported format for different ID types, refer to the User entity. Use the simple form only if domain information isn't available. Store the Username type in the ActorUsernameType field. If other username formats are available, store them in the fields ActorUsername.
  examples:
  - AlbertE
- name: Dvc
  role: device
  class: Mandatory
  description: For process activity events, device fields refer to the system on which the process was executed.
- name: EventCount
  role: common
  class: Mandatory
- name: EventEndTime
  role: common
  class: Mandatory
- name: EventProduct
  role: common
  class: Mandatory
- name: EventResult
  role: common
  class: Mandatory
- name: EventSchema
  role: common
  class: Mandatory
  type: String
  value: ProcessEvent
  description: The name of the schema documented here is ProcessEvent.
- name: EventSchemaVersion
  role: common
  class: Mandatory
  type: SchemaVersion (String)
  value: 0.1.4
  description: The version of the schema. The version of the schema documented here is 0.1.4
- name: EventStartTime
  role: common
  class: Mandatory
- name: EventType
  role: common
  class: Mandatory
  type: Enumerated
  allowed_values:
  - ProcessCreated
  - ProcessTerminated
  description: 'Describes the operation reported by the record. For Process records, supported values include: - ProcessCreated - ProcessTerminated'
- name: EventVendor
  role: common
  class: Mandatory
- name: TargetProcessCommandLine
  role: target
  class: Mandatory
  type: String
  description: The command line used to run the target process.
  examples:
  - '"choco.exe" -v'
- name: TargetProcessId
  role: target
  class: Mandatory
  type: String
  description: The process ID (PID) of the target process.
  examples:
  - '48610176'
  notes: The type is defined as string to support varying systems, but on Windows and Linux this value must be numeric. If you are using a Windows or Linux machine and used a different type, make sure to convert the values. For example, if you used a hexadecimal value, convert it to a decimal value.
- name: TargetProcessName
  role: target
  class: Mandatory
  type: string
  description: The name of the target process. This name is commonly derived from the image or executable file that's used to define the initial code and data that's mapped into the process' virtual address space.
  examples:
  - C:\Windows\explorer.exe
- name: ActorUserId
  role: actor
  class: Recommended
  type: String
  description: A machine-readable, alphanumeric, unique representation of the Actor. For the supported format for different ID types, refer to the User entity.
  examples:
  - S-1-12
- name: DvcAction
  role: device
  class: Recommended
- name: DvcDomain
  role: device
  class: Recommended
- name: DvcDomainType
  role: device
  class: Recommended
- name: DvcFQDN
  role: device
  class: Recommended
- name: DvcHostname
  role: device
  class: Recommended
- name: DvcId
  role: device
  class: Recommended
- name: DvcIdType
