name: AgentEvent
title: Agent Event
kind: event
version: 0.1.0
status: GA
summary: The Microsoft Sentinel Agent Event normalization schema represents events associated with the activities and telemetry of AI agents operating throughout enterprise environments. These events capture the full spectrum of agent interactions, including model invocations, tool usage, token consumption, thought processes, and communication between source and target agents. These activities are generated by a wide range of AI agent platforms and frameworks, each producing telemetry in its own format. Every AI agent platform logs agent events as part of its operational telemetry. Normalizing these events using the ASIM schema enables security analysts to correlate agent behaviors between platforms, detect anomalous patterns, and investigate incidents without having to learn the proprietary format of each source. For more information about normalization in Microsoft Sentinel, see Normalization and the Advanced Security Information Model (ASIM).
fields:
- name: EventCount
  role: common
  class: Mandatory
- name: EventEndTime
  role: common
  class: Mandatory
- name: EventProduct
  role: common
  class: Mandatory
- name: EventSchema
  role: common
  class: Mandatory
  type: Enumerated
  value: AgentEvent
  description: The name of the schema documented here is AgentEvent.
- name: EventSchemaVersion
  role: common
  class: Mandatory
  type: SchemaVersion (String)
  value: 0.1.0
  description: The version of the schema. The version of the schema documented here is 0.1.0.
- name: EventStartTime
  role: common
  class: Mandatory
- name: EventVendor
  role: common
  class: Mandatory
- name: EventUid
  role: common
  class: Recommended
- name: SrcAgentId
  role: source
  class: Recommended
  type: String
  description: The unique ID of the source agent.
- name: SrcAgentName
  role: source
  class: Recommended
  type: String
  description: The name of the source agent.
- name: ActingAppId
  role: acting
  class: Optional
  type: String
  description: The ID of the application that initiated the activity reported, including a process, browser, or service. For
  examples:
  - '0x12ae8'
- name: ActingAppName
  role: acting
  class: Optional
  type: String
  description: The name of the application that initiated the activity reported, including a service, a URL, or a SaaS application. For
  examples:
  - C:\Windows\System32\svchost.exe
- name: ActingAppType
  role: acting
  class: Optional
  type: AppType
  description: The type of acting application. For more information, and allowed list of values, see AppType in the Schema Overview article.
- name: ActingOriginalAppType
  role: acting
  class: Optional
  type: String
  description: The type of the application that initiated the activity as reported by the reporting device.
- name: ActorUserId
  role: actor
  class: Optional
  type: String
  description: A machine-readable, alphanumeric, unique representation of the Actor. For more information, and for alternative fields for other IDs, see The User entity.
  examples:
  - S-1-12-1-4141952679-1282074057-627758481-2916039507
- name: ActorUserIdType
  role: actor
  class: Optional
  type: String
  description: The type of the ID stored in the ActorUserId field. For more information and list of allowed values, see UserIdType in the Schema Overview article.
- name: ActorUsername
  role: actor
  class: Optional
  type: Username (String)
  description: "The Actor\u2019s username, including domain information when available. For more information, see The User entity."
  examples:
  - AlbertE
- name: ActorUsernameType
  role: actor
  class: Optional
  type: String
  description: Specifies the type of the user name stored in the ActorUsername field. For more information, and list of allowed values, see UsernameType in the Schema Overview article.
  examples:
  - Windows
- name: ActorUserScope
  role: actor
  class: Optional
  type: String
  description: The scope, such as Microsoft Entra Domain Name, in which ActorUserId and ActorUsername are defined. For more information and a list of allowed values, see UserScope in the Schema Overview article.
- name: ActorUserScopeId
  role: actor
  class: Optional
  type: String
  description: The scope ID, such as Microsoft Entra Directory ID, in which ActorUserId and ActorUsername are defined. For more information and a list of allowed values, see UserScopeId in the Schema Overview article.
- name: AdditionalFields
  role: common
  class: Optional
- name: EventErrorDetails
  role: common
  class: Optional
  type: String
  description: Details about the error associated with the event.
- name: EventFinishReasons
  role: common
  class: Optional
  type: dynamic
  description: The reasons the event finished.
- name: EventOriginalErrorType
  role: common
  class: Optional
  type: String
  description: The original error type as reported by the source.
- name: EventOriginalRequestDetails
  role: common
  class: Optional
  type: String
  description: The original request details as reported by the source.
- name: EventOriginalResultDetails
  role: common
  class: Optional
  type: String
  description: The original result details as reported by the source.
- name: EventOriginalType
  role: common
  class: Optional
  type: String
  description: Describes the operation called by the agent that initiated the event. Because this is an evolving space where agents can perform a vast number of actions, we have not enforced a set of enumerations for EventType.
- name: EventOriginalUid
  role: common
  class: Optional
- name: EventOutputType
  role: common
  class: Optional
  type: String
  description: The type of the event output.
- name: EventRequestFrequencyPenalty
  role: common
  class: Optional
  type: double
  description: The frequency penalty parameter of the event request.
- name: EventRequestId
  role: common
  class: Optional
  type: String
  description: The unique ID of the event request.
- name: EventRequestPresencePenalty
  role: common
  class: Optional
  type: double
  description: The presence penalty parameter of the event request.
- name: EventRequestSeed
  role: common
  class: Optional
  type: long
  description: The seed parameter of the event request.
- name: EventRequestTemperature
  role: common
  class: Optional
  type: double
  description: The temperature parameter of the event request.
- name: EventRequestTopP
  role: common
  class: Optional
  type: double
  description: The top-p parameter of the event request.
- name: EventResponseId
  role: common
  class: Optional
  type: String
  description: The unique ID of the event response.
- name: EventSessionId
  role: common
  class: Optional
  type: String
  description: The unique ID of the event session.
- name: EventSessionName
  role: common
  class: Optional
  type: String
  description: The name of the event session.
- name: EventThoughtProcessDetails
  role: common
  class: Optional
  type: String
  description: Details about the thought process associated with the event.
- name: EventThoughtProcessId
  role: common
  class: Optional
  type: String
  description: The unique ID of the thought process.
- name: EventType
  role: common
  class: Optional
  type: String
  description: The type of the event.
- name: InputTokensUsed
  role: model
  class: Optional
  type: long
  description: The number of input tokens used.
- name: ModelName
  role: model
  class: Optional
  type: String
  description: The name of the model.
- name: ModelProviderName
  role: model
  class: Optional
  type: String
  description: The name of the model provider.
- name: OutputTokensUsed
  role: model
  class: Optional
  type: long
  description: The number of output tokens used.
- name: PlatformTargetAgentDescription
  role: platform
  class: Optional
  type: String
  description: A description of the platform target agent.
- name: PlatformTargetAgentId
  role: platform
  class: Optional
  type: String
  description: The unique ID of the platform target agent.
- name: PlatformTargetAgentName
  role: platform
  class: Optional
  type: String
  description: The name of the platform target agent.
- name: PlatformTargetOriginalAgentType
  role: platform
  class: Optional
  type: String
  description: The original type of the platform target agent.
- name: SrcAgentBlueprintId
  role: source
  class: Optional
  type: String
  description: The blueprint ID of the source agent.
- name: SrcAgentDescription
  role: source
  class: Optional
  type: String
  description: A description of the source agent.
- name: SrcAgentOriginalType
  role: source
  class: Optional
  type: String
  description: The original type of the source agent.
- name: SrcFQDN
  role: source
  class: Optional
  type: String
  description: The fully qualified domain name of the source.
- name: SrcIpAddr
  role: source
  class: Optional
  type: String
  description: The IP address of the source.
- name: SrcPortNumber
  role: source
  class: Optional
  type: int
  description: The port number of the source.
- name: TargetAgentBlueprintId
  role: target
  class: Optional
  type: String
  description: The blueprint ID of the target agent.
- name: TargetAgentDescription
  role: target
  class: Optional
  type: String
  description: A description of the target agent.
- name: TargetAgentId
  role: target
  class: Optional
  type: String
  description: The unique ID of the target agent.
- name: TargetAgentName
  role: target
  class: Optional
  type: String
  description: The name of the target agent.
- name: TargetAgentOriginalType
  role: target
  class: Optional
  type: String
  description: The original type of the target agent.
- name: TargetAgentUserId
  role: target
  class: Optional
  type: String
  description: The user ID of the target agent.
- name: TargetAgentUsername
  role: target
  class: Optional
  type: String
  description: The username of the target agent.
- name: ToolDescription
  role: tool
  class: Optional
  type: String
  description: A description of the tool.
- name: ToolId
  role: tool
  class: Optional
  type: String
  description: The unique ID of the tool.
- name: ToolName
  role: tool
  class: Optional
  type: String
  description: The name of the tool.
- name: ToolOriginalType
  role: tool
  class: Optional
  type: String
  description: The original type of the tool.
