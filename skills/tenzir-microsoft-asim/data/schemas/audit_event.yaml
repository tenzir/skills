name: AuditEvent
title: Audit Event
kind: event
version: 0.1.2
status: GA
summary: The Microsoft Sentinel Audit events normalization schema represents events associated with the audit trail of information systems. The audit trail logs system configuration activities and policy changes. Such changes are often performed by system administrators, but can also be performed by users when configuring the settings of their own applications. Every system logs audit events alongside its core activity logs. For example, a Firewall will log events about the network sessions is processes, and audit events about configuration changes applied to the Firewall itself. For more information about normalization in Microsoft Sentinel, see Normalization and the Advanced Security Information Model (ASIM).
fields:
- name: Dvc
  role: device
  class: Mandatory
  type: String
  to:
  - DvcFQDN
  - DvcHostname
  - DvcId
  - DvcIpAddr
  description: A unique identifier of the device on which the event occurred or which reported the event, depending on the schema. This field might alias the DvcFQDN, DvcId, DvcHostname, or DvcIpAddr fields. For cloud sources, for which there's no apparent device, use the same value as the Event Product field.
- name: EventCount
  role: common
  class: Mandatory
  type: Integer
  description: The number of events described by the record. This value is used when the source supports aggregation, and a single record might represent multiple events. For other sources, set to 1.
- name: EventEndTime
  role: common
  class: Mandatory
  type: Date/time
  to:
  - TimeGenerated
  description: The time when the event ended. If the source supports aggregation and the record represents multiple events, the time that the last event was generated. If not provided by the source record, this field aliases the TimeGenerated field.
- name: EventProduct
  role: common
  class: Mandatory
  type: String
  description: The product generating the event. The value should be one of the values listed in Vendors and Products.
  examples:
  - Sysmon
- name: EventResult
  role: common
  class: Mandatory
  type: Enumerated
  description: 'One of the following values: Success, Partial, Failure, NA (Not Applicable). The value might be provided in the source record by using different terms, which should be normalized to these values. Alternatively, the source might provide only the EventResultDetails field, which should be analyzed to derive the EventResult value.'
  examples:
  - Success
- name: EventSchema
  role: common
  class: Mandatory
  type: Enumerated
  value: AuditEvent
  description: The name of the schema documented here is AuditEvent.
- name: EventSchemaVersion
  role: common
  class: Mandatory
  type: SchemaVersion (String)
  value: 0.1.2
  description: The version of the schema. The version of the schema documented here is 0.1.2.
- name: EventStartTime
  role: common
  class: Mandatory
  type: Date/time
  to:
  - TimeGenerated
  description: The time when the event started. If the source supports aggregation and the record represents multiple events, the time that the first event was generated. If not provided by the source record, this field aliases the TimeGenerated field.
- name: EventType
  role: common
  class: Mandatory
  type: Enumerated
  allowed_values:
  - Set
  - Read
  - Create
  - Delete
  - Execute
  - Install
  - Clear
  - Enable
  - Disable
  - Initialize
  - Start
  - Stop
  - Other
  description: 'Describes the operation audited by the event using a normalized value. Use EventSubType to provide further details, which the normalized value does not convey, and Operation. to store the operation as reported by the reporting device. For Audit Event records, the allowed values are: - Set - Read - Create - Delete - Execute - Install - Clear - Enable - Disable - Initialize - Start - Stop - Other Audit events represent a large variety of operations, and the Other value enables mapping operations that have no corresponding EventType. However, the use of Other limits the usability of the event and should be avoided if possible.'
- name: EventVendor
  role: common
  class: Mandatory
  type: String
  description: The vendor of the product generating the event. The value should be one of the values listed in Vendors and Products.
  examples:
  - Microsoft
- name: Object
  role: object
  class: Mandatory
  type: String
  description: The name of the object on which the operation identified by EventType is performed.
- name: Operation
  class: Mandatory
  type: String
  description: The operation audited as reported by the reporting device.
- name: ActorUsername
  role: actor
  class: Recommended
  type: Username (String)
  description: "The Actor\u2019s username, including domain information when available. For more information, see The User entity."
  examples:
  - AlbertE
- name: DvcAction
  role: device
  class: Recommended
  type: String
  description: For reporting security systems, the action taken by the system, if applicable.
  examples:
  - Blocked
- name: DvcDomain
  role: device
  class: Recommended
  type: Domain (String)
  description: The domain of the device on which the event occurred or which reported the event, depending on the schema.
  examples:
  - Contoso
- name: DvcDomainType
  role: device
  class: Recommended
  type: Enumerated
  required_if:
  - the DvcDomain field is used
  description: The type of DvcDomain. For a list of allowed values and further information, refer to DomainType.
  notes: This field is required if the DvcDomain field is used.
- name: DvcFQDN
  role: device
  class: Recommended
  type: FQDN (String)
  description: The hostname of the device on which the event occurred or which reported the event, depending on the schema.
  examples:
  - Contoso\DESKTOP-1282V4D
  notes: This field supports both traditional FQDN format and Windows domain\hostname format. The DvcDomainType field reflects the format used.
- name: DvcHostname
  role: device
  class: Recommended
  type: Hostname
  description: The hostname of the device on which the event occurred or which reported the event, depending on the schema.
  examples:
  - ContosoDc
- name: DvcId
  role: device
  class: Recommended
  type: String
  description: The unique ID of the device on which the event occurred or which reported the event, depending on the schema. If multiple IDs are available, use the first one from the list, and store the others by using the field names DvcAzureResourceId, DvcMDEid, etc.
  examples:
  - 41502da5-21b7-48ec-81c9-baeea8d7d669
- name: DvcIdType
  role: device
  class: Recommended
  type: Enumerated
  required_if:
  - the DvcId field is used
  allowed_values:
  - AzureResourceId
  - MDEid
  - MD4IoTid
  - VMConnectionId
  - AwsVpcId
  - VectraId
  - AppGateId
  - FQDN
  - Other
  description: The type of DvcId. The list of allowed values is AzureResourceId, MDEid, MD4IoTid, VMConnectionId, AwsVpcId, VectraId, AppGateId, FQDN, and Other. Using FQDN as a device ID, implies reusing the hostname. Use it only as a last resort.
  notes: This field is required if the DvcId field is used.
- name: DvcIpAddr
  role: device
  class: Recommended
  type: IP address
  description: The IP address of the device on which the event occurred or which reported the event, depending on the schema.
  examples:
  - 45.21.42.12
- name: EventResultDetails
  role: common
  class: Recommended
  type: Enumerated
  description: Reason or details for the result reported in the EventResult field. Each schema documents the list of values valid for this field. The original, source specific, value is stored in the EventOriginalResultDetails field.
  examples:
  - NXDOMAIN
- name: EventSeverity
  role: common
  class: Recommended
  type: Enumerated
  description: 'The severity of the event. Valid values are: Informational, Low, Medium, or High.'
- name: EventUid
  role: common
  class: Recommended
  type: String
  description: The unique ID of the record, as assigned by Microsoft Sentinel. This field is typically mapped to the _ItemId Log Analytics field.
- name: NewValue
  class: Recommended
  type: String
  description: The new value of Object after the operation was performed, if applicable.
- name: SrcIpAddr
  role: source
  class: Recommended
  type: IP address
  description: The IP address from which the connection or session originated.
  examples:
  - 77.138.103.108
  - 45.21.42.12
- name: TargetHostname
  role: target
  class: Recommended
  type: Hostname
  description: The target device hostname, excluding domain information.
  examples:
  - DESKTOP-1282V4D
- name: TargetIpAddr
  role: target
  class: Recommended
  type: IP Address
  description: The IP address of the target device.
  examples:
  - 2.2.2.2
  - 45.21.42.12
- name: ActorUserIdType
  role: actor
  class: Conditional
  type: Enumerated
  description: The type of the ID stored in the ActorUserId field. For more information and list of allowed values, see UserIdType in the Schema Overview article.
- name: ActorUsernameType
  role: actor
  class: Conditional
  type: UsernameType
  description: Specifies the type of the user name stored in the ActorUsername field. For more information, and list of allowed values, see UsernameType in the Schema Overview article.
  examples:
  - Windows
- name: ObjectType
  role: object
  class: Conditional
  type: Enumerated
  allowed_values:
  - Cloud Resource
  - Configuration Atom
  - Policy Rule
  - Event Log
  - Scheduled Task
  - Service
  - Directory Service Object
  - Other
  description: 'The type of Object. Allowed values are: - Cloud Resource - Configuration Atom - Policy Rule - Event Log -Scheduled Task -Service -Directory Service Object -Other'
- name: SrcDomainType
  role: source
  class: Conditional
  type: DomainType
  required_if:
  - SrcDomain is used
  description: The type of SrcDomain. For a list of allowed values and further information, refer to DomainType in the Schema Overview article. Required if SrcDomain is used.
- name: SrcDvcIdType
  role: source
  class: Conditional
  type: DvcIdType
  required_if:
  - SrcDvcId is used
  description: The type of SrcDvcId. For a list of allowed values and further information, refer to DvcIdType in the Schema Overview article.
  notes: This field is required if SrcDvcId is used.
- name: TargetAppType
  role: target
  class: Conditional
  type: AppType
  description: The type of the application authorizing on behalf of the Actor. For more information, and allowed list of values, see AppType in the Schema Overview article.
- name: TargetDomainType
  role: target
  class: Conditional
  type: Enumerated
  required_if:
  - TargetDomain is used
  description: The type of TargetDomain. For a list of allowed values and further information, refer to DomainType in the Schema Overview article. Required if TargetDomain is used.
- name: TargetDvcIdType
  role: target
  class: Conditional
  type: Enumerated
  required_if:
  - TargetDeviceId is used
  description: The type of TargetDvcId. For a list of allowed values and further information, refer to DvcIdType in the Schema Overview article. Required if TargetDeviceId is used.
- name: ThreatField
  role: threat
  class: Conditional
  type: Enumerated
  allowed_values:
  - SrcIpAddr
  - TargetIpAddr
  description: The field for which a threat was identified. The value is either SrcIpAddr or TargetIpAddr.
- name: ValueType
  role: object
  class: Conditional
  type: Enumerated
  allowed_values:
  - Other
  description: The type of the old and new values. Allowed values are - Other
- name: ActingAppId
  role: acting
  class: Optional
  type: String
  description: The ID of the application that initiated the activity reported, including a process, browser, or service.
  examples:
  - '0x12ae8'
  - '124'
- name: ActingAppName
  role: acting
  class: Optional
  type: String
  description: The name of the application that initiated the activity reported, including a service, a URL, or a SaaS application.
  examples:
  - C:\Windows\System32\svchost.exe
  - Facebook
- name: ActingAppType
  role: acting
  class: Optional
  type: AppType
  description: The type of acting application. For more information, and allowed list of values, see AppType in the Schema Overview article.
- name: ActingOriginalAppType
  role: acting
  class: Optional
  type: String
  description: The type of the application that initiated the activity as reported by the reporting device.
- name: ActorOriginalUserType
  role: actor
  class: Optional
  type: String
  description: The user type as reported by the reporting device.
- name: ActorScope
  role: actor
  class: Optional
  type: String
  description: The scope, such as Microsoft Entra Domain Name, in which ActorUserId and ActorUsername are defined. or more information and list of allowed values, see UserScope in the Schema Overview article.
- name: ActorScopeId
  role: actor
  class: Optional
  type: String
  description: The scope ID, such as Microsoft Entra Directory ID, in which ActorUserId and ActorUsername are defined. for more information and list of allowed values, see UserScopeId in the Schema Overview article.
- name: ActorSessionId
  role: actor
  class: Optional
  type: String
  description: The unique ID of the sign-in session of the Actor.
  examples:
  - 102pTUgC3p8RIqHvzxLCHnFlg
- name: ActorUserId
  role: actor
  class: Optional
  type: String
  description: A machine-readable, alphanumeric, unique representation of the Actor. For more information, and for alternative fields for other IDs, see The User entity.
  examples:
  - S-1-12-1-4141952679-1282074057-627758481-2916039507
- name: ActorUserType
  role: actor
  class: Optional
  type: UserType
  description: The type of the Actor. For more information, and list of allowed values, see UserType in the Schema Overview article.
  examples:
  - Guest
- name: AdditionalFields
  role: common
  class: Optional
  type: Dynamic
  description: If your source provides additional information worth preserving, either keep it with the original field names or create the dynamic AdditionalFields field, and add the extra information as key/value pairs.
- name: DvcDescription
  role: device
  class: Optional
  type: String
  description: A descriptive text associated with the device.
  examples:
  - Primary Domain Controller
- name: DvcInterface
  role: device
  class: Optional
  type: String
  description: The network interface on which data was captured. This field is typically relevant to network related activity, which is captured by an intermediate or tap device.
- name: DvcMacAddr
  role: device
  class: Optional
  type: MAC address
  description: The MAC address of the device on which the event occurred or which reported the event.
  examples:
  - 00:1B:44:11:3A:B7
- name: DvcOriginalAction
  role: device
  class: Optional
  type: String
  description: The original DvcAction as provided by the reporting device.
- name: DvcOs
  role: device
  class: Optional
  type: String
  description: The operating system running on the device on which the event occurred or which reported the event.
  examples:
  - Windows
- name: DvcOsVersion
  role: device
  class: Optional
  type: String
  description: The version of the operating system on the device on which the event occurred or which reported the event.
  examples:
  - '10'
- name: DvcScope
  role: device
  class: Optional
  type: String
  description: The cloud platform scope the device belongs to. DvcScope map to a subscription ID on Azure and to an account ID on AWS.
- name: DvcScopeId
  role: device
  class: Optional
  type: String
  description: The cloud platform scope ID the device belongs to. DvcScopeId map to a subscription ID on Azure and to an account ID on AWS.
- name: DvcZone
  role: device
  class: Optional
  type: String
  description: The network on which the event occurred or which reported the event, depending on the schema. The zone is defined by the reporting device.
  examples:
  - Dmz
- name: EventMessage
  role: common
  class: Optional
  type: String
  description: A general message or description, either included in or generated from the record.
- name: EventOriginalResultDetails
  role: common
  class: Optional
  type: String
  description: The original result details provided by the source. This value is used to derive EventResultDetails, which should have only one of the values documented for each schema.
- name: EventOriginalSeverity
  role: common
  class: Optional
  type: String
  description: The original severity as provided by the reporting device. This value is used to derive EventSeverity.
- name: EventOriginalSubType
  role: common
  class: Optional
  type: String
  description: The original event subtype or ID, if provided by the source. For example, this field is used to store the original Windows logon type. This value is used to derive EventSubType, which should have only one of the values documented for each schema.
  examples:
  - '2'
- name: EventOriginalType
  role: common
  class: Optional
  type: String
  description: The original event type or ID, if provided by the source. For example, this field is used to store the original Windows event ID. This value is used to derive EventType, which should have only one of the values documented for each schema.
  examples:
  - '4624'
- name: EventOriginalUid
  role: common
  class: Optional
  type: String
  description: A unique ID of the original record, if provided by the source.
  examples:
  - 69f37748-ddcd-4331-bf0f-b137f1ea83b
- name: EventOwner
  role: common
  class: Optional
  type: String
  description: The owner of the event, which is usually the department or subsidiary in which it was generated.
- name: EventProductVersion
  role: common
  class: Optional
  type: String
  description: The version of the product generating the event.
  examples:
  - '12.1'
- name: EventReportUrl
  role: common
  class: Optional
  type: URL (String)
  description: A URL provided in the event for a resource that provides more information about the event.
- name: EventSubType
  role: common
  class: Optional
  type: String
  description: Provides further details, which the normalized value in EventType does not convey.
- name: HttpUserAgent
  role: http
  class: Optional
  type: String
  description: When authentication is performed over HTTP or HTTPS, this field's value is the user_agent HTTP header provided by the acting application when performing the authentication.
  examples:
  - Mozilla/5.0 (iPhone; CPU iPhone OS 12_1 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/12.0 Mobile/15E148 Safari/604.1
- name: ObjectId
  class: Optional
  type: String
  description: The ID of the object on which the operation identified by EventType is performed.
- name: OldValue
  class: Optional
  type: String
  description: The old value of Object prior to the operation, if applicable.
- name: OriginalObjectType
  class: Optional
  type: String
  description: The type of Object as reported by the reporting system
- name: RuleName
  role: rule
  class: Optional
  type: String
  description: The name or ID of the rule by associated with the inspection results.
- name: RuleNumber
  role: rule
  class: Optional
  type: Integer
  description: The number of the rule associated with the inspection results.
- name: SrcDescription
  role: source
  class: Optional
  type: String
  description: A descriptive text associated with the device.
  examples:
  - Primary Domain Controller
- name: SrcDeviceType
  role: source
  class: Optional
  type: DeviceType
  description: The type of the source device. For a list of allowed values and further information, refer to DeviceType in the Schema Overview article.
- name: SrcDomain
  role: source
  class: Optional
  type: Domain (String)
  description: The domain of the source device.
  examples:
  - Contoso
- name: SrcDvcId
  role: source
  class: Optional
  type: String
  description: The ID of the source device. If multiple IDs are available, use the most important one, and store the others in the fields SrcDvc.
  examples:
  - ac7e9755-8eae-4ffc-8a02-50ed7a2216c3
  - 41502da5-21b7-48ec-81c9-baeea8d7d669
- name: SrcDvcScope
  role: source
  class: Optional
  type: String
  description: The cloud platform scope the device belongs to. SrcDvcScope map to a subscription ID on Azure and to an account ID on AWS.
- name: SrcDvcScopeId
  role: source
  class: Optional
  type: String
  description: The cloud platform scope ID the device belongs to. SrcDvcScopeId map to a subscription ID on Azure and to an account ID on AWS.
- name: SrcFQDN
  role: source
  class: Optional
  type: FQDN (String)
  description: The source device hostname, including domain information when available.
  examples:
  - Contoso\DESKTOP-1282V4D
  notes: This field supports both traditional FQDN format and Windows domain\hostname format. The SrcDomainType field reflects the format used.
- name: SrcGeoCity
  role: source
  class: Optional
  type: City
  description: The city associated with the source IP address.
  examples:
  - Burlington
- name: SrcGeoCountry
  role: source
  class: Optional
  type: Country
  description: The country/region associated with the source IP address.
  examples:
  - USA
- name: SrcGeoLatitude
  role: source
  class: Optional
  type: Latitude
  description: The latitude of the geographical coordinate associated with the source IP address.
  examples:
  - '44.475833'
- name: SrcGeoLongitude
  role: source
  class: Optional
  type: Longitude
  description: The longitude of the geographical coordinate associated with the source IP address.
  examples:
  - '73.211944'
- name: SrcGeoRegion
  role: source
  class: Optional
  type: Region
  description: The region within a country/region associated with the source IP address.
  examples:
  - Vermont
- name: SrcHostname
  role: source
  class: Optional
  type: Hostname
  description: The source device hostname, excluding domain information. If no device name is available, store the relevant IP address in this field.
  examples:
  - DESKTOP-1282V4D
- name: SrcOriginalRiskLevel
  role: source
  class: Optional
  type: String
  description: The risk level associated with the source, as reported by the reporting device.
  examples:
  - Suspicious
- name: SrcPortNumber
  role: source
  class: Optional
  type: Integer
  description: The IP port from which the connection originated. Might not be relevant for a session comprising multiple connections.
  examples:
  - '2335'
- name: SrcRiskLevel
  role: source
  class: Optional
  type: Integer
  description: The risk level associated with the source. The value should be adjusted to a range of 0 to 100, with 0 for benign and 100 for a high risk.
  examples:
  - '90'
- name: TargetAppId
  role: target
  class: Optional
  type: String
  description: The ID of the application to which the event applies, including a process, browser, or service.
  examples:
  - '89162'
  - '124'
- name: TargetAppName
  role: target
  class: Optional
  type: String
  description: The name of the application to which event applies, including a service, a URL, or a SaaS application.
  examples:
  - Exchange 365
  - Facebook
- name: TargetDescription
  role: target
  class: Optional
  type: String
  description: A descriptive text associated with the device.
  examples:
  - Primary Domain Controller
- name: TargetDeviceType
  role: target
  class: Optional
  type: Enumerated
  description: The type of the target device. For a list of allowed values and further information, refer to DeviceType in the Schema Overview article.
- name: TargetDomain
  role: target
  class: Optional
  type: Domain(String)
  description: The domain of the target device.
  examples:
  - Contoso
- name: TargetDvcId
  role: target
  class: Optional
  type: String
  description: The ID of the target device. If multiple IDs are available, use the most important one, and store the others in the fields TargetDvc.
  examples:
  - ac7e9755-8eae-4ffc-8a02-50ed7a2216c3
  - 41502da5-21b7-48ec-81c9-baeea8d7d669
- name: TargetDvcOs
  role: target
  class: Optional
  type: String
  description: The OS of the target device.
  examples:
  - Windows 10
  - Windows
- name: TargetDvcScope
  role: target
  class: Optional
  type: String
  description: The cloud platform scope the device belongs to. TargetDvcScope map to a subscription ID on Azure and to an account ID on AWS.
- name: TargetDvcScopeId
  role: target
  class: Optional
  type: String
  description: The cloud platform scope ID the device belongs to. TargetDvcScopeId map to a subscription ID on Azure and to an account ID on AWS.
- name: TargetFQDN
  role: target
  class: Optional
  type: FQDN (String)
  description: The target device hostname, including domain information when available.
  examples:
  - Contoso\DESKTOP-1282V4D
  notes: This field supports both traditional FQDN format and Windows domain\hostname format. The TargetDomainType reflects the format used.
- name: TargetGeoCity
  role: target
  class: Optional
  type: City
  description: The city associated with the Target IP address.
  examples:
  - Burlington
- name: TargetGeoCountry
  role: target
  class: Optional
  type: Country
  description: The country/region associated with the Target IP address.
  examples:
  - USA
- name: TargetGeoLatitude
  role: target
  class: Optional
  type: Latitude
  description: The latitude of the geographical coordinate associated with the Target IP address.
  examples:
  - '44.475833'
- name: TargetGeoLongitude
  role: target
  class: Optional
  type: Longitude
  description: The longitude of the geographical coordinate associated with the Target IP address.
  examples:
  - '73.211944'
- name: TargetGeoRegion
  role: target
  class: Optional
  type: Region
  description: The region within a country/region associated with the Target IP address.
  examples:
  - Vermont
- name: TargetOriginalAppType
  role: target
  class: Optional
  type: String
  description: The type of the application to which event applies as reported by the reporting device.
- name: TargetOriginalRiskLevel
  role: target
  class: Optional
  type: String
  description: The risk level associated with the target, as reported by the reporting device.
  examples:
  - Suspicious
- name: TargetPortNumber
  role: target
  class: Optional
  type: Integer
  description: The port of the target device.
- name: TargetRiskLevel
  role: target
  class: Optional
  type: Integer
  description: The risk level associated with the target. The value should be adjusted to a range of 0 to 100, with 0 for benign and 100 for a high risk.
  examples:
  - '90'
- name: TargetUrl
  role: target
  class: Optional
  type: URL
  description: The URL associated with the target application.
  examples:
  - https://console.aws.amazon.com/console/home?fromtb=true&hashArgs=%23&isauthcode=true&nc2=h_ct&src=header-signin&state=hashArgsFromTB_us-east-1_7596bc16c83d260b
- name: ThreatCategory
  role: threat
  class: Optional
  type: String
  description: The category of the threat or malware identified in audit file activity.
- name: ThreatConfidence
  role: threat
  class: Optional
  type: ConfidenceLevel (Integer)
  description: The confidence level of the threat identified, normalized to a value between 0 and a 100.
- name: ThreatFirstReportedTime
  role: threat
  class: Optional
  type: datetime
  description: The first time the IP address or domain were identified as a threat.
- name: ThreatId
  role: threat
  class: Optional
  type: String
  description: The ID of the threat or malware identified in the audit activity.
- name: ThreatIpAddr
  role: threat
  class: Optional
  type: IP Address
  description: An IP address for which a threat was identified. The field ThreatField contains the name of the field ThreatIpAddr represents.
- name: ThreatIsActive
  role: threat
  class: Optional
  type: Boolean
  description: True if the threat identified is considered an active threat.
- name: ThreatLastReportedTime
  role: threat
  class: Optional
  type: datetime
  description: The last time the IP address or domain were identified as a threat.
- name: ThreatName
  role: threat
  class: Optional
  type: String
  description: The name of the threat or malware identified in the audit activity.
- name: ThreatOriginalConfidence
  role: threat
  class: Optional
  type: String
  description: The original confidence level of the threat identified, as reported by the reporting device.
- name: ThreatOriginalRiskLevel
  role: threat
  class: Optional
  type: String
  description: The risk level as reported by the reporting device.
- name: ThreatRiskLevel
  role: threat
  class: Optional
  type: RiskLevel (Integer)
  description: The risk level associated with the identified threat. The level should be a number between 0 and 100.
  notes: The value might be provided in the source record by using a different scale, which should be normalized to this scale. The original value should be stored in ThreatRiskLevelOriginal.
- name: Application
  role: application
  class: Alias
  to:
  - TargetAppName
- name: Dst
  role: destination
  class: Alias
  type: String
  to:
  - TargetAppId
  - TargetAppName
  - TargetDvcId
  - TargetHostname
  - TargetIpAddr
  resolution: A unique identifier of the authentication target. This field may alias the TargetDvcId, TargetHostname, TargetIpAddr, TargetAppId, or TargetAppName fields.
  examples:
  - 192.168.12.1
- name: IpAddr
  role: network
  class: Alias
  type: IP address
  to:
  - SrcIpAddr
  - TargetIpAddr
  resolution: Alias to SrcIpAddr, or to TargetIpAddr if SrcIpAddr is not provided.
  examples:
  - 45.21.42.12
- name: Rule
  role: rule
  class: Alias
  type: String
  resolution: Either the value of RuleName or the value of RuleNumber. If the value of RuleNumber is used, the type should be converted to string.
- name: Src
  role: source
  class: Alias
  type: String
  to:
  - SrcDvcId
  - SrcHostname
  - SrcIpAddr
  resolution: A unique identifier of the source device. This field might alias the SrcDvcId, SrcHostname, or SrcIpAddr fields.
  examples:
  - 192.168.12.1
- name: User
  role: user
  class: Alias
  to:
  - ActorUsername
- name: Value
  class: Alias
  to:
