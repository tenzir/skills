name: SrcProcessId
summary: The process ID (PID) of the process that initiated the DNS request.
schemas:
- name: Dns
  role: source
  class: Optional
  type: String
  description: The process ID (PID) of the process that initiated the DNS request.
  examples:
  - '48610176'
  notes: The type is defined as string to support varying systems, but on Windows and Linux this value must be numeric. If you are using a Windows or Linux machine and used a different type, make sure to convert the values. For example, if you used a hexadecimal value, convert it to a decimal value.
- name: NetworkSession
  role: source
  class: Optional
  type: String
  description: The process ID (PID) of the process that initiated the network session.
  examples:
  - '48610176'
  notes: The type is defined as string to support varying systems, but on Windows and Linux this value must be numeric. If you are using a Windows or Linux machine and used a different type, make sure to convert the values. For example, if you used a hexadecimal value, convert it to a decimal value.
