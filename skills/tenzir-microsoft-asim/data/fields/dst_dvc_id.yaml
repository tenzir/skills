name: DstDvcId
summary: The ID of the destination device as reported in the record.
schemas:
- name: Dns
  role: destination
  class: Optional
  type: String
  description: The ID of the destination device as reported in the record.
  examples:
  - ac7e9755-8eae-4ffc-8a02-50ed7a2216c3
  - 41502da5-21b7-48ec-81c9-baeea8d7d669
- name: NetworkSession
  role: destination
  class: Optional
  type: String
  description: The ID of the destination device. If multiple IDs are available, use the most important one, and store the others in the fields DstDvc.
  examples:
  - ac7e9755-8eae-4ffc-8a02-50ed7a2216c3
  - 41502da5-21b7-48ec-81c9-baeea8d7d669
