name: Duration
summary: Duration is an alias for DhcpSessionDuration, DnsNetworkDuration, NetworkDuration.
to:
- DhcpSessionDuration
- DnsNetworkDuration
- NetworkDuration
schemas:
- name: DhcpEvent
  role: network
  class: Alias
