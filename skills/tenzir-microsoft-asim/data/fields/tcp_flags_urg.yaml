name: TcpFlagsUrg
summary: The TCP URG Flag reported. The urgent flag is used to notify the receiver to process the urgent packets before processing all other packets. The receiver will be notified when all known urgent data has been received. See RFC 6093 for more details.
schemas:
- name: NetworkSession
  role: network
  class: Optional
  type: Boolean
