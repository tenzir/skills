name: ActingAppName
summary: The name of the application that initiated the activity reported, including a service, a URL, or a SaaS application.
schemas:
- name: AgentEvent
  role: acting
  class: Optional
  type: String
  description: The name of the application that initiated the activity reported, including a service, a URL, or a SaaS application.
  examples:
  - C:\Windows\System32\svchost.exe
  - Facebook
- name: AuditEvent
  role: acting
  class: Optional
  type: String
  description: The name of the application that initiated the activity reported, including a service, a URL, or a SaaS application.
  examples:
  - C:\Windows\System32\svchost.exe
  - Facebook
- name: Authentication
  role: acting
  class: Optional
  type: String
  description: The name of the application authorizing on behalf of the actor, including a process, browser, or service.
  examples:
  - C:\Windows\System32\svchost.exe
  - Facebook
- name: FileEvent
  role: acting
  class: Optional
  type: String
  description: The name of the acting application.
  examples:
  - Facebook
- name: UserManagement
  role: acting
  class: Optional
  type: String
  description: The name of the application used by the actor to perform the activity, including a process, browser, or service.
  examples:
  - C:\Windows\System32\svchost.exe
  - Facebook
