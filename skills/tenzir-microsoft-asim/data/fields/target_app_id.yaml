name: TargetAppId
summary: The ID of the application to which the event applies, including a process, browser, or service.
schemas:
- name: AuditEvent
  role: target
  class: Optional
  type: String
  description: The ID of the application to which the event applies, including a process, browser, or service.
  examples:
  - '89162'
- name: Authentication
  role: target
  class: Optional
  type: String
  description: The ID of the application to which the authorization is required, often assigned by the reporting device.
  examples:
  - '89162'
- name: FileEvent
  role: target
  class: Optional
  type: String
  description: The ID of the destination application, as reported by the reporting device.
