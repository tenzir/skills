name: SrcProcessGuid
summary: A generated unique identifier (GUID) of the process that initiated the DNS request.
schemas:
- name: Dns
  role: source
  class: Optional
  type: GUID (String)
  description: A generated unique identifier (GUID) of the process that initiated the DNS request.
  examples:
  - EF3BD0BD-2B74-60C5-AF5C-010000001E00
  - 01234567-89AB-CDEF-0123-456789ABCDEF
- name: NetworkSession
  role: source
  class: Optional
  type: String
  description: A generated unique identifier (GUID) of the process that initiated the network session.
  examples:
  - EF3BD0BD-2B74-60C5-AF5C-010000001E00
  - 01234567-89AB-CDEF-0123-456789ABCDEF
