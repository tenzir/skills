name: TargetFileDirectory
summary: The target file folder or location. This field should be similar to the TargetFilePath field, without the final element.
schemas:
- name: FileEvent
  role: target
  class: Optional
  type: String
  description: The target file folder or location. This field should be similar to the TargetFilePath field, without the final element.
  notes: A parser can provide this value if the value available in the log source and does not need to be extracted from the full path.
