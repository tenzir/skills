name: EventSeverity
summary: If the source device does not provide an event severity, EventSeverity should be based on the value of DvcAction. If DvcAction is Deny, Drop, Drop ICMP, Reset, Reset Source, or Reset Destination , EventSeverity should be Low. Otherwise, EventSeverity should be Informational.
