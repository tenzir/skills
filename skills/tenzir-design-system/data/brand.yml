    white: neutral-50
    black: neutral-800
    blue: blue-500
    green: green-500
    cyan: lightblue-500
    purple: purple-500
    pink: pink-500
    orange: orange-500
    yellow: yellow-500
    red: red-500

    brand-blue: blue-500
    brand-green: green-500
    graph-1: blue-500
    graph-2: lightblue-500
    graph-3: purple-500
    graph-4: pink-500
    graph-5: orange-500
    graph-6: yellow-500

  foreground: neutral-800
  background: neutral-50
  primary: blue-500
  secondary: neutral-600
  tertiary: neutral-500
  success: green-600
  info: lightblue-600
  warning: yellow-600
  danger: red-500
  light: neutral-50
  dark: neutral-800

typography:
  # Both families are open source and available on Google Fonts. Consumers
  # that need offline or file-based fonts (e.g., Typst rendering) can override
  # the source with local font files.
  fonts:
    - family: Inter
      source: google
      weight: [400, 500, 600]
      style: [normal, italic]
    - family: JetBrains Mono
      source: google
      weight: [400, 500, 600]
      style: [normal, italic]
  base:
    family: Inter
    weight: 400
    size: 16px
    line-height: 1.5
  headings:
    family: Inter
    weight: 600
    line-height: 1.2
    color: foreground
  monospace:
    family: JetBrains Mono
    weight: 400
    size: 0.875rem
  monospace-inline:
    family: JetBrains Mono
    color: neutral-700
    background-color: neutral-100
  monospace-block:
    family: JetBrains Mono
    color: neutral-700
    background-color: neutral-100
    line-height: 1.4
  link:
    color: primary
    weight: 500
