# Tenzir brand definition following Quarto's brand.yml schema
# (https://posit-dev.github.io/brand-yml/).
#
# This file is the canonical source for Tenzir brand colors, typography, and
# logos. Tools that understand brand.yml (Quarto, Shiny, Typst via Quarto) can
# consume it directly; everything beyond the brand.yml schema lives in
# tokens.yml next to this file.

meta:
  name: Tenzir
  link:
    home: https://tenzir.com
    docs: https://docs.tenzir.com
    github: https://github.com/tenzir

logo:
  # Variant names describe the artwork color: "dark" artwork goes on light
  # backgrounds, "light" artwork goes on dark backgrounds.
  images:
    logo-dark:
      path: ../assets/logos/logo-dark.svg
      alt: Tenzir logo
    logo-light:
      path: ../assets/logos/logo-light.svg
      alt: Tenzir logo
    logomark-dark:
      path: ../assets/logos/logomark-dark.svg
      alt: Tenzir logomark
    logomark-light:
      path: ../assets/logos/logomark-light.svg
      alt: Tenzir logomark
  small:
    light: logomark-dark
    dark: logomark-light
  medium:
    light: logo-dark
    dark: logo-light
  large:
    light: logo-dark
    dark: logo-light

