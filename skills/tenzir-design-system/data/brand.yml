    orange-100: "#FFF5F0"

    yellow-600: "#D09611"
    yellow-500: "#EDAE1D"
    yellow-400: "#F1C255"
    yellow-300: "#F9E4B4"
    yellow-200: "#FEF6E1"
    yellow-100: "#FFF9F0"

    red-600: "#E00025"
    red-500: "#FF0A33"
