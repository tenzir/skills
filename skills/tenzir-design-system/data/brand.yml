    neutral-250: "#E3E6ED"
    neutral-200: "#F0F1F5"
    neutral-100: "#F7F8FA"
    neutral-50: "#FDFDFE"

    blue-600: "#0043E0"
    blue-500: "#0A54FF"
    blue-400: "#477EFF"
    blue-300: "#ADC6FF"
    blue-200: "#E0EAFF"
    blue-100: "#F0F4FF"
    blue-50: "#F8F9FC"

    green-600: "#1AB252"
    green-500: "#29E06C"
    green-400: "#5EE891"
    green-300: "#B8F5CE"
    green-200: "#E4FBEC"
    green-100: "#F2FDF6"

    lightblue-600: "#0096E0"
    lightblue-500: "#0AADFF"
    lightblue-400: "#47C2FF"
    lightblue-300: "#ADE4FF"
    lightblue-200: "#E0F5FF"
    lightblue-100: "#F0FAFF"

    purple-600: "#B400E0"
    purple-500: "#CF0AFF"
    purple-400: "#DB47FF"
    purple-300: "#EFADFF"
    purple-200: "#F9E0FF"
    purple-100: "#FCF0FF"

    pink-600: "#E0008E"
    pink-500: "#FF0AA5"
