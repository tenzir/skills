summary: Browser cookie.
fields:
  name:
    type: string
    description: The unique name identifying the cookie.
  value:
    type: string
    description: The data stored within the cookie.
  domain:
    type: string
    description: The domain for which the cookie is valid.
  path:
    type: string
    description: The URL path for which the cookie is valid.
  expiration_time:
    type: timestamp
    ingestion_name: expirationTime
    description: The date and time when the cookie will expire.
  http_only:
    type: bool
    ingestion_name: httpOnly
    description: Indicates if the cookie is inaccessible via client-side scripts (e.g., JavaScript).
  secure:
    type: bool
    description: Indicates if the cookie should only be sent over secure HTTPS connections.
  max_age:
    type: int64
    ingestion_name: maxAge
    description: The maximum age of the cookie in seconds.
  same_site:
    type: CookieSameSite
    ingestion_name: sameSite
    description: Affects cross-site request behavior.
  session:
    type: bool
    description: Indicates if the cookie is persistent.
  partitioned:
    type: bool
    description: Shows if the cookies is stored using partitioned storage.
