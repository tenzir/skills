summary: The ResourceUsage extension captures details about what is using a resource.
fields:
  used_entity:
    type: string
    ingestion_name: usedEntity
    description: The name of the entity (e.g., process, user) that is using the resource.
  used_entity_id:
    type: string
    ingestion_name: usedEntityId
    description: A numerical identifier for the entity using the resource (e.g., PID, UID).
