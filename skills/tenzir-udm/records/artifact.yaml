summary: Information about an artifact. The artifact can only be an IP.
fields:
  ip:
    type: string
    description: IP address of the artifact. This field can be used as an entity indicator for an external destination IP
      entity.
  prevalence:
    type: Prevalence
    description: The prevalence of the artifact within the customer's environment.
  first_seen_time:
    type: timestamp
    ingestion_name: firstSeenTime
    description: First seen timestamp of the IP in the customer's environment.
  last_seen_time:
    type: timestamp
    ingestion_name: lastSeenTime
    description: Last seen timestamp of the IP address in the customer's environment.
  location:
    type: Location
    description: Location of the Artifact's IP address.
  network:
    type: Network
    description: Network information related to the Artifact's IP address.
  as_owner:
    type: string
    ingestion_name: asOwner
    description: Owner of the Autonomous System to which the IP address belongs.
  asn:
    type: int64
    description: Autonomous System Number to which the IP address belongs.
  jarm:
    type: string
    description: The JARM hash for the IP address. (https://engineering.salesforce.com/easily-identify-malicious-servers-on-the-internet-with-jarm-e095edac525a).
  last_https_certificate:
    type: SSLCertificate
    ingestion_name: lastHttpsCertificate
    description: SSL certificate information about the IP address.
  last_https_certificate_date:
    type: timestamp
    ingestion_name: lastHttpsCertificateDate
    description: Most recent date for the certificate in VirusTotal.
  regional_internet_registry:
    type: string
    ingestion_name: regionalInternetRegistry
    description: 'RIR (one of the current RIRs: AFRINIC, ARIN, APNIC, LACNIC or RIPE NCC).'
  tags:
    type: list<string>
    description: Identification attributes
  whois:
    type: string
    description: WHOIS information as returned from the pertinent WHOIS server.
  whois_date:
    type: timestamp
    ingestion_name: whoisDate
    description: Date of the last update of the WHOIS record in VirusTotal.
  tunnels:
    type: list<Tunnels>
    description: VPN tunnels.
  anonymous:
    type: bool
    description: Whether the VPN tunnels are configured for anonymous browsing or not.
  artifact_client:
    type: ArtifactClient
    ingestion_name: artifactClient
    description: Entity or software accessing or utilizing network resources.
  risks:
    type: list<string>
    description: This field lists potential risks associated with the network activity.
