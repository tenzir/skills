leef_version: '2.0'
source: https://www.ibm.com/docs/en/dsm?topic=overview-predefined-leef-event-attributes
description: 'Predefined LEEF event attributes. Use these keys in the event payload whenever
  they match the data; add custom keys only when no predefined attribute fits. Keys with normalized:
  true are parsed into normalized QRadar event fields automatically; normalized: false keys
  require a custom event property to surface in the QRadar Log Activity tab. Keys with reserved:
  true are reserved in the LEEF specification but not implemented in QRadar.'
parsing_notes: |-
  > **Note:**
  > Non-normalized predefined LEEF event attributes are not automatically parsed for all log source types. However, QRadar provides custom properties (either built-in or from the IBM Security App Exchange) for some of these keys. You can configure custom properties for non-normalized keys to parse by using Regex. To configure a key to parse, the input is `key=([^\t]+)`.
  >
  > The following examples show Regex inputs for non-normalized predefined keys, where the delimiter that follows the caret (^) is a horizontal tab in LEEF V1.0:
  >
  > - The input for `vSrc` is `vSrc=([^\t]+)`.
  > - The input for `vSrcName` is `vSrcName=([^\t]+)`.
  > - The input for `accountName` is `accountName=([^\t]+)`.
  >
  > The following examples show Regex inputs for non-normalized predefined keys, where the delimiter that follows the caret (^) is a customized separator character in LEEF V2.0:
  >
  > - If you use # as the delimiter, the input for `vSrc` is `vSrc=([^#]+)`.
  > - If you use | as the delimiter, the input for `vSrc` is `vSrc=([^|]+)`.
  >
  > QRadar V7.3.2 or later includes property auto-detection for custom properties of both predefined and custom LEEF event attributes. Property auto-detection makes it easier to configure custom properties, without the use of Regex.
attributes:
- key: cat
  type: string
  normalized: true
  description: |-
    An abbreviation for event category is used to extend the EventID field with more specific information about the LEEF event that is forwarded to QRadar.

    Cat and the EventID field in the LEEF header help map your appliance event to a QRadar Identifier (QID) map entry. The EventID represents the first column and the category represents the second column of the QID map.

    > **Restriction:** The value of the event category must be consistent and static across products that support multiple languages. If your product supports multi-language events, you can use a numeric or textual value in the `cat` field. The value in the `cat` field must not be translated when the language of your appliance or application is altered.

    Example 1: Use the `cat` key to extend the EventID with additional information to describe the event. If the EventID is defined as a User Login event, use the category to further categorize the event, such as a success or failed login. You can define your EventIDs further with the `cat` key, and the extra detail from the event can be used to distinguish between events when the same EventID is used for similar event types, for example,

    `LEEF:1.0|Microsoft|Exchange|2013|Login Event|cat=Failed`

    `LEEF:1.0|Microsoft|Exchange|2013|Login Event|cat=Success`

    Example 2: Use the `cat` key to define a high-level event category and use the EventID to define the low-level. This situation can be important when the EventID doesn't match any value in the QID map. When the EventID doesn't match any value in the QID map, QRadar can use the category and other keys to further determine the general nature of the event. This "fallback" prevents events from being identified as unknown and QRadar can categorize the events based on the known information from the key attribute fields of the event payload, for example,

    `LEEF:1.0|Microsoft|Endpoint|2015|`

    `Conficker_worm|cat=Detected`
- key: devTime
  type: date
  normalized: true
  description: |-
    The raw event date and time that is generated by your appliance or application that provides the LEEF event.

    QRadar uses the `devTime` key, along with `devTimeFormat` to identify and properly format the event time from your appliance or application.

    If the `devTime` value is an epoch value of 10 or 13 digits, a `devTimeFormat` string is not required. Otherwise, the `devTime` and `devTimeFormat` keys must be used together to ensure that the time of the event is accurately parsed by QRadar.

    When present in the event payload, `devTime` is used to identify the event time, even when the syslog header contains a date and time stamp. The syslog header date and time stamp is a fallback identifier, but `devTime` is the preferred method for event time identification.
- key: devTimeFormat
  type: string
  normalized: false
  description: |-
    Applies formatting to the raw date and time of the `devTime key`.

    The `devTimeFormat` key is required if your event log contains `devTime`. For more information, see [Custom event date format](docs/date-format.md).
- key: proto
  type: integer_or_keyword
  normalized: true
  description: |-
    Identifies the transport protocol of the event.

    For a list of keywords or integer values, see the Internet Assigned Numbers Authority website,

    [http://www.iana.org/assignments/protocol-numbers/protocol-numbers.xml](http://www.iana.org/assignments/protocol-numbers/protocol-numbers.xml)
- key: sev
  type: integer
  normalized: true
  description: |-
    Indicates the severity of the event.

    1 is the lowest event severity.

    10 is the highest event severity.
  limits: 1-10
- key: src
  type: ip_address
  normalized: true
  description: The IP address of the event source.
- key: dst
  type: ip_address
  normalized: true
  description: The IP address of the event destination.
- key: srcPort
  type: integer
  normalized: true
  description: The source port of the event.
  limits: 0 - 65535
- key: dstPort
  type: integer
  normalized: true
  description: The destination port of the event.
  limits: 0 - 65535
- key: srcPreNAT
  type: ip_address
  normalized: true
  description: The source IP address of the event message before Network Address Translation
    (NAT).
- key: dstPreNAT
  type: ip_address
  normalized: true
  description: The destination address for the event message before Network Address Translation
    (NAT).
- key: srcPostNAT
  type: ip_address
  normalized: true
  description: The source IP address of the message after Network Address Translation (NAT)
    occurred.
- key: dstPostNAT
  type: ip_address
  normalized: true
  description: The destination IP address of the message after Network Address Translation
    (NAT) occurred.
- key: usrName
  type: string
  normalized: true
  description: The user name that is associated with the event.
  limits: '255'
- key: srcMAC
  type: mac_address
  normalized: true
  description: |-
    The MAC address of the event source in hexadecimal. The MAC address is made up of six groups of two hexadecimal digits, which are colon-separated, for example,

    `11:2D:1a:2b:3c:4d`
- key: dstMAC
  type: mac_address
  normalized: true
  description: |-
    The MAC address of the event destination in hexadecimal. The MAC address is composed of six groups of two hexadecimal digits, which are colon-separated, for example,

    `11:2D:1a:2b:3c:4d`
- key: srcPreNATPort
  type: integer
  normalized: true
  description: The port number of the event source before Network Address Translation (NAT).
  limits: 0 - 65535
- key: dstPreNATPort
  type: integer
  normalized: true
  description: The port number of the event destination before Network Address Translation
    (NAT).
  limits: 0 - 65535
- key: srcPostNATPort
  type: integer
  normalized: true
  description: The port number of the event source after Network Address Translation (NAT).
  limits: 0 - 65535
- key: dstPostNATPort
  type: integer
  normalized: true
  description: The port number of the event destination after Network Address Translation
    (NAT).
  limits: 0 - 65535
- key: identSrc
  type: ip_address
  normalized: true
  description: |-
    Identity source represents an extra IPv4 or IPv6 address that can connect an event with a true user identify or true computer identity.

    Example 1: Connecting a person to a network identity.

    User X logs in from their notebook and then connects to a shared system on the network. When their activity generates an event, then the `identSrc` in the payload can be used to include more IP address information. QRadar uses the `identSrc` information in the event along with the payload information, such as `username`, to identify that user X is bob.smith.

    The following identity keys depend on `identSrcs` presence in the event payload:

    `identHostName`

    `identNetBios`

    `identGrpName`

    `identMAC`
- key: identHostName
  type: string
  normalized: null
  description: |-
    Host name information that is associated with the `identSrc` to further identify the true host name that is tied to an event.

    The `identHostName` parameter is usable by QRadar only when your device provides both the `identSrc` key and `identHostName` together in an event payload.
  limits: '255'
  notes: IBM's table lists "Key" instead of "Yes" or "No" in the normalized column, in both
    the web guide and the PDF, so normalized is null.
- key: identNetBios
  type: string
  normalized: true
  description: |-
    NetBIOS name that is associated with the `identSrc` to further identify the identity event with NetBIOS name resolution.

    The `identNetBios` parameter is usable by QRadar only when your device provides both the `identSrc` key and `identNetBios` together in an event payload.
  limits: '255'
- key: identGrpName
  type: string
  normalized: true
  description: |-
    Group name that is associated with the `identSrc` to further identify the identity event with Group name resolution.

    The `identGrpName` parameter is usable by QRadar only when your device provides both the `identSrc` key and `identGrpName` together in an event payload.
  limits: '255'
- key: identMAC
  type: mac_address
  normalized: true
  description: Reserved for future use in the LEEF format.
  reserved: true
- key: vSrc
  type: ip_address
  normalized: false
  description: The IP address of the virtual event source.
- key: vSrcName
  type: string
  normalized: false
  description: The name of the virtual event source.
  limits: '255'
- key: accountName
  type: string
  normalized: false
  description: The account name that is associated with the event.
  limits: '255'
- key: srcBytes
  type: integer
  normalized: false
  description: Indicates the byte count from the event source.
- key: dstBytes
  type: integer
  normalized: false
  description: Indicates the byte count to the event destination.
- key: srcPackets
  type: integer
  normalized: false
  description: Indicates the packet count from the event source.
- key: dstPackets
  type: integer
  normalized: false
  description: Indicates the packet count to the event destination.
- key: totalPackets
  type: integer
  normalized: false
  description: Indicates the total number of packets that are transmitted between the source
    and destination.
- key: role
  type: string
  normalized: false
  description: The type of `role` that is associated with the user account that created the
    event, for example, Administrator, User, Domain Admin.
- key: realm
  type: string
  normalized: false
  description: The `realm` that is associated with the user account. Depending on your device,
    can be a general grouping or based on region, for example, accounting, remote offices.
- key: policy
  type: string
  normalized: false
  description: A `policy` that is associated with the user account. This `policy` is typically
    the security policy or group policy that is tied to the user account.
- key: resource
  type: string
  normalized: false
  description: A `resource` that is associated with the user account. This `resource` is typically
    the computer name.
- key: url
  type: string
  normalized: false
  description: '`URL` information that is included with the event.'
- key: groupID
  type: string
  normalized: false
  description: The `groupID` that is associated with the user account.
- key: domain
  type: string
  normalized: false
  description: The `domain` that is associated with the user account.
- key: isLoginEvent
  type: boolean_string
  normalized: false
  description: |-
    Identifies if the event is related to a user login, for example,

    `isLoginEvent=true`

    `isLoginEvent=false`

    This key is reserved in the LEEF specification, but not implemented in QRadar.
  limits: true or false
  reserved: true
- key: isLogoutEvent
  type: boolean_string
  normalized: false
  description: |-
    Identifies if the event is related to a user logout, for example,

    `isLogoutEvent=true`

    `isLogoutEvent=false`

    This key is reserved in the LEEF specification, but not implemented in QRadar.
  limits: true or false
  reserved: true
- key: identSecondlp
  type: ip_address
  normalized: false
  description: |-
    Identity second IP address represents an IPv4 or IPv6 address that is used to associate a device event that includes a secondary IP address. Secondary IP addresses can be in events by routers, switches, or virtual LAN (VLAN) device events.

    This key is reserved in the LEEF specification, but not implemented in QRadar.
  reserved: true
  notes: The published key name contains an IBM documentation typo (likely intended identSecondIp).
    Both the web guide and the PDF spell it identSecondlp; use the key verbatim.
- key: calLanguage
  type: string
  normalized: false
  description: |-
    Identifies the language of the device time (`devTime`) key to allow translation and to ensure that QRadar correctly parses the date and time of events that are generated in translated languages.

    The `calLanaguage` field can include two alphanumeric characters to represent the event language for the device time of your event. All `calLanguage` alphanumeric characters follow the ISO 639-1 format, for example,

    `calLanguage=fr devTime=avril 09 2014 12:30:55`

    `calLanguage=de devTime=Di 30 Jun 09 14:56:11`

    This key is reserved in the LEEF specification, but not implemented currently in QRadar.
  limits: '2'
  reserved: true
- key: calCountryOrRegion
  type: string
  normalized: false
  description: |-
    Extends the `calLanguage` key to provide more translation information that can include the country or region for the event device time (`devTime`). The key `calCountryOrRegion` must be used with the `calLanguage` key.

    The `calCountryOrRegion` field can include two alphanumeric characters to represent the event country or region for the device time of your event. All `calCountryOrRegion` alphanumeric characters follow the ISO 3166 format, for example,

    `calLanguage=de calCountryOrRegion=DE devTime=Di 09 Jun 2014 12:30:55`

    `calLanguage=en calCountryOrRegion=US devTime=Tue 30 Jun 09`

    This key is reserved in the LEEF specification, but not implemented in QRadar.
  limits: '2'
  reserved: true
