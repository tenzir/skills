summary: Stores information related to the risk score of an entity.
fields:
  risk_version:
    type: string
    ingestion_name: riskVersion
    description: Version of the risk score calculation algorithm.
  risk_window:
    type: interval
    ingestion_name: riskWindow
    description: Time window used when computing the risk score for an entity, for example 24 hours or 7 days.
  DEPRECATED_risk_score:
    type: int32
    ingestion_name: DEPRECATEDRiskScore
    deprecated: true
    description: Deprecated risk score.
  risk_delta:
    type: optional<RiskDelta>
    ingestion_name: riskDelta
    description: Represents the change in risk score for an entity between the end of the previous time window and the end
      of the current time window.
  detections_count:
    type: int32
    ingestion_name: detectionsCount
    description: Number of detections that make up the risk score within the time window.
  first_detection_time:
    type: timestamp
    ingestion_name: firstDetectionTime
    description: Timestamp of the first detection within the specified time window. This field is empty when there are no
      detections.
  last_detection_time:
    type: timestamp
    ingestion_name: lastDetectionTime
    description: Timestamp of the last detection within the specified time window. This field is empty when there are no detections.
  risk_score:
    type: float
    ingestion_name: riskScore
    description: Raw risk score for the entity.
  normalized_risk_score:
    type: int32
    ingestion_name: normalizedRiskScore
    description: Normalized risk score for the entity. This value is between 0-1000.
  risk_window_size:
    type: duration
    ingestion_name: riskWindowSize
    description: Risk window duration for the entity.
  raw_risk_delta:
    type: optional<RiskDelta>
    ingestion_name: rawRiskDelta
    description: Represents the change in raw risk score for an entity between the end of the previous time window and the
      end of the current time window.
  last_reset_time:
    type: timestamp
    ingestion_name: lastResetTime
    description: Timestamp for UEBA risk score reset based deduplication. Used specifically for risk based meta rules.
  detail_uri:
    type: string
    ingestion_name: detailUri
    description: Link to the Google Security Operations UI with information about the entity risk score. If the SecOps instance
      has multiple frontend paths configured, this will be a relative path that can be used to construct the full URL.
  risk_window_has_new_detections:
    type: bool
    ingestion_name: riskWindowHasNewDetections
    description: Whether there are new detections for the risk window.
