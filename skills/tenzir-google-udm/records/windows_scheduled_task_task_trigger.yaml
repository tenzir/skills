summary: The trigger of the scheduled task.
fields:
  enabled:
    type: bool
    description: Indicates whether the task trigger is enabled.
  duration:
    type: duration
    description: The duration of the task trigger repetition.
  interval:
    type: string
    description: The interval between each repetition of the task. The format for this string is `P<days>DT<hours>H<minutes>M<seconds>S`
      (for example, "PT5M" is 5 minutes, "PT1H" is 1 hour, and "PT20M" is 20 minutes). The maximum time allowed is 31 days,
      and the minimum time allowed is 1 minute.
  trigger_type:
    type: TriggerType
    ingestion_name: triggerType
    description: The trigger frequency of the task.
