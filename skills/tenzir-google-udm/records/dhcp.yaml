summary: DHCP information.
fields:
  opcode:
    type: OpCode
    description: The BOOTP op code.
  htype:
    type: uint32
    description: Hardware address type.
  hlen:
    type: uint32
    description: Hardware address length.
  hops:
    type: uint32
    description: Hardware ops.
  transaction_id:
    type: uint32
    ingestion_name: transactionId
    description: Transaction ID.
  seconds:
    type: uint32
    description: Seconds elapsed since client began address acquisition/renewal process.
  flags:
    type: uint32
    description: Flags.
  ciaddr:
    type: string
    description: Client IP address (ciaddr).
  yiaddr:
    type: string
    description: Your IP address (yiaddr).
  siaddr:
    type: string
    description: IP address of the next bootstrap server.
  giaddr:
    type: string
    description: Relay agent IP address (giaddr).
  chaddr:
    type: string
    description: Client hardware address (chaddr).
  sname:
    type: string
    description: Server name that the client wishes to boot from.
  file:
    type: string
    description: Boot image filename.
  options:
    type: list<Option>
    description: List of DHCP options.
  type:
    type: MessageType
    description: DHCP message type.
  lease_time_seconds:
    type: uint32
    ingestion_name: leaseTimeSeconds
    description: Lease time in seconds. See RFC2132, section 9.2.
  client_hostname:
    type: string
    ingestion_name: clientHostname
    description: Client hostname. See RFC2132, section 3.14.
  client_identifier:
    type: bytes
    ingestion_name: clientIdentifier
    description: 'Client identifier. See RFC2132, section 9.14. Note: Make sure to update the client_identifier_string field
      as well if you update this field.'
  requested_address:
    type: string
    ingestion_name: requestedAddress
    description: Requested IP address. See RFC2132, section 9.1.
  client_identifier_string:
    type: string
    ingestion_name: clientIdentifierString
    description: Client identifier as string. See RFC2132, section 9.14. This field holds the string value of the client_identifier.
