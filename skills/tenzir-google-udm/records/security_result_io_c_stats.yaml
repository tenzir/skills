summary: Information about the threat intelligence source. These fields are used to model Mandiant sources.
fields:
  ioc_stats_type:
    type: IoCStatsType
    ingestion_name: iocStatsType
    description: Describes the source of the IoCStat.
  first_level_source:
    type: string
    ingestion_name: firstLevelSource
    description: Name of first level IoC source, for example Mandiant or a third-party.
  second_level_source:
    type: string
    ingestion_name: secondLevelSource
    description: Name of the second-level IoC source, for example Crowdsourced Threat Analysis or Knowledge Graph.
  benign_count:
    type: int32
    ingestion_name: benignCount
    description: Count of responses where the IoC was identified as benign.
  quality:
    type: ProductConfidence
    description: Level of confidence in the IoC mapping extracted from the source.
  malicious_count:
    type: int32
    ingestion_name: maliciousCount
    description: Count of responses where the IoC was identified as malicious.
  response_count:
    type: int32
    ingestion_name: responseCount
    description: Total number of response from the source.
  source_count:
    type: int32
    ingestion_name: sourceCount
    description: Number of sources from which information was extracted.
