summary: AtiPrioritization contains various fields used to calculate a priority score for an entity identified as a threat.
fields:
  gti_verdict:
    type: int32
    ingestion_name: gtiVerdict
    description: The confidence score from "GTI verdict" source.
  gti_severity:
    type: int32
    ingestion_name: gtiSeverity
    description: The confidence score from "GTI severity" source.
  gti_threat_score:
    type: int32
    ingestion_name: gtiThreatScore
    description: The confidence score from "GTI threat score" source.
  mandiant_analyst_confidence:
    type: int32
    ingestion_name: mandiantAnalystConfidence
    description: The confidence score from "Mandiant Analyst Intel" source.
  gti_update_time:
    type: timestamp
    ingestion_name: gtiUpdateTime
    description: Timestamp of the latest update for GTI verdict, severity, or threat score.
  active_ir:
    type: bool
    ingestion_name: activeIr
    description: Whether one or more Mandiant incident response customers had this indicator in their environment.
  active_ir_first_tagged_time:
    type: timestamp
    ingestion_name: activeIrFirstTaggedTime
    description: The timestamp of the first time an active IR was applied to this entity.
  global_customer_count:
    type: int64
    ingestion_name: globalCustomerCount
    description: Global customer count over the last 30 days
  global_hit_count:
    type: int64
    ingestion_name: globalHitCount
    description: Global hit count over the last 30 days
  exclusive:
    type: bool
    description: Whether the indicator is being used by a maximum of one threat actor.
  osint:
    type: bool
    description: Whether the indicator details are available in open source.
  scanner:
    type: bool
    description: Whether the indicator is a scanner.
  reviewed:
    type: bool
    description: Whether the indicator verdict has passed review.
  attributed_malware:
    type: list<Association>
    ingestion_name: attributedMalware
    description: Malware families associated with this indicator.
  attributed_threat_actors:
    type: list<Association>
    ingestion_name: attributedThreatActors
    description: Threat actors associated with this indicator.
