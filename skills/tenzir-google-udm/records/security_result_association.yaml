summary: Associations represents different metadata about malware and threat actors involved with an IoC.
fields:
  id:
    type: string
    description: Unique association id generated by mandiant.
  country_code:
    type: list<string>
    ingestion_name: countryCode
    description: Country from which the threat actor/ malware is originated.
  type:
    type: AssociationType
    description: Signifies the type of association.
  name:
    type: string
    description: Name of the threat actor/malware.
  description:
    type: string
    description: Human readable description about the association.
  role:
    type: string
    description: Role of the malware. Not applicable for threat actor.
  source_country:
    type: string
    ingestion_name: sourceCountry
    deprecated: true
    description: Name of the country the threat originated from.
  alias:
    type: list<AssociationAlias>
    description: Different aliases of the threat actor given by different sources.
  first_reference_time:
    type: timestamp
    ingestion_name: firstReferenceTime
    description: First time the threat actor was referenced or seen.
  last_reference_time:
    type: timestamp
    ingestion_name: lastReferenceTime
    description: Last time the threat actor was referenced or seen.
  industries_affected:
    type: list<string>
    ingestion_name: industriesAffected
    description: List of industries the threat actor affects.
  associated_actors:
    type: list<Association>
    ingestion_name: associatedActors
    description: List of associated threat actors for a malware. Not applicable for threat actors.
  region_code:
    type: Location
    ingestion_name: regionCode
    description: Name of the country, the threat is originating from.
  sponsor_region:
    type: Location
    ingestion_name: sponsorRegion
    description: Sponsor region of the threat actor.
  targeted_regions:
    type: list<Location>
    ingestion_name: targetedRegions
    description: Targeted regions.
  tags:
    type: list<string>
    description: Tags.
