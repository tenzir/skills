summary: Information about an entry in the web browser's local history database.
fields:
  browser_type:
    type: BrowserType
    ingestion_name: browserType
    description: The browser that recorded the history entry (e.g. "Chrome", "Firefox", "Safari", etc.).
  browser_version:
    type: string
    ingestion_name: browserVersion
    description: The browser version.
  first_visit_time:
    type: timestamp
    ingestion_name: firstVisitTime
    description: The timestamp indicating the initial visit to the URL.
  last_visit_time:
    type: timestamp
    ingestion_name: lastVisitTime
    description: The timestamp indicating the most recent visit to the URL.
  profile:
    type: string
    description: The browser profile associated with the history entry.
  typed:
    type: bool
    description: A boolean value indicating if the URL was typed by the user.
  visit_type:
    type: UrlVisitType
    ingestion_name: visitType
    description: Describes the type of navigation or visit (e.g., direct, redirect, etc.).
  hidden:
    type: bool
    description: A boolean value indicating if the history entry is hidden.
  request_origin_uri:
    type: string
    ingestion_name: requestOriginUri
    description: Indicates the URI from which the current visit originated.
  visit_count:
    type: int64
    ingestion_name: visitCount
    description: The total number of times the Url has been visited.
  visit_count_criteria:
    type: string
    ingestion_name: visitCountCriteria
    description: Describes the criteria used to calculate the visit_count.
  indexed_content:
    type: string
    ingestion_name: indexedContent
    description: Represents the textual content of a web page. This field should be kept short. Large strings may affect latency
      and payload sizes.
  first_bookmarked_time:
    type: timestamp
    ingestion_name: firstBookmarkedTime
    description: The timestamp indicating the first time the URL was bookmarked.
  cookies:
    type: list<Cookie>
    description: Information about the cookies.
  typed_count:
    type: int64
    ingestion_name: typedCount
    description: The number of times the URL was visited with this specific visit type and visit source.
  visit_source:
    type: VisitSource
    ingestion_name: visitSource
    description: The source of the visit.
