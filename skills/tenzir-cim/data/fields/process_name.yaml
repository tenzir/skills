name: process_name
used_by:
- model: Application_State
  dataset: All_Application_State
  source: calculated
  type: string
  description: The name of a process.
  calculation:
    id: All_Application_State_fillnull_process_name
    type: Rex
    expression: ^\s*(?<process_name>[^\s]+)
    input_field: process
- model: Endpoint
  dataset: Filesystem
  source: calculated
  type: string
  description: The friendly name of the process, such as notepad.exe.
  recommended: true
  calculation:
    id: Endpoint_Filesystem_fillnull_process_name
    type: Eval
    expression: case(isnotnull(process_name) AND process_name!="", process_name, isnotnull(process) AND process!="" AND match(process, "^\s*(?:\"..*\\\([^\"]+)\").*"), replace( process, "^\s*(?:\"..*\\\([^\"]+)\").*", "\1" ), isnotnull(process) AND process!="" AND match(process, "^(?:..*\\\)?([^\s\"]+)(?=\s|$).*"), replace( process, "^(?:..*\\\)?([^\s\"]+)(?=\s|$).*", "\1" ), 1=1, "unknown")
- model: Endpoint
  dataset: Processes
  source: calculated
  type: string
  description: The friendly name of the process, such as notepad.exe.
  recommended: true
  calculation:
    id: Endpoint_Processes_fillnull_process_name
    type: Eval
    expression: case(isnotnull(process_name) AND process_name!="", process_name, isnotnull(process) AND process!="" AND match(process, "^\s*(?:\"..*\\\([^\"]+)\").*"), replace( process, "^\s*(?:\"..*\\\([^\"]+)\").*", "\1" ), isnotnull(process) AND process!="" AND match(process, "^(?:..*\\\)?([^\s\"]+)(?=\s|$).*"), replace( process, "^(?:..*\\\)?([^\s\"]+)(?=\s|$).*", "\1" ), 1=1, "unknown")
- model: Endpoint
  dataset: Registry
  source: calculated
  type: string
  description: The friendly name of the process, such as notepad.exe.
  recommended: true
  calculation:
    id: Endpoint_Registry_fillnull_process_name
    type: Eval
    expression: case(isnotnull(process_name) AND process_name!="", process_name, isnotnull(process) AND process!="" AND match(process, "^\s*(?:\"..*\\\([^\"]+)\").*"), replace( process, "^\s*(?:\"..*\\\([^\"]+)\").*", "\1" ), isnotnull(process) AND process!="" AND match(process, "^(?:..*\\\)?([^\s\"]+)(?=\s|$).*"), replace( process, "^(?:..*\\\)?([^\s\"]+)(?=\s|$).*", "\1" ), 1=1, "unknown")
- model: JVM
  dataset: Runtime
  source: declared
  type: string
  description: Process name of the JVM process.
