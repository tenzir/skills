name: process
used_by:
- model: Application_State
  dataset: All_Application_State
  source: calculated
  type: string
  description: 'The name of a process or service file, such as sqlsrvr.exe or httpd. Note: This field is not appropriate for service or daemon names, such as SQL Server or Apache Web Server. Service or daemon names belong to the service field.'
  recommended: true
  calculation:
    id: All_Application_State_fillnull_process
    type: Eval
    expression: if(isnull(process) OR process="","unknown",process)
- model: Authentication
  dataset: Authentication
  source: declared
  type: string
  description: Full path and the name of the executable for the process that attempted the logon. For example, it is a "Process Name" in Windows such as `C:\Windows\System32\svchost.exe`.
- model: Email
  dataset: All_Email
  source: declared
  type: string
  description: The name of the email executable that carries out the message transaction, such as sendmail, postfix, or the name of an email client.
- model: Endpoint
  dataset: Filesystem
  source: calculated
  type: string
  description: The full command string of the spawned process. Such as C:\WINDOWS\system32\cmd.exe /c ""C:\Program Files\SplunkUniversalForwarder\etc\system\bin\powershell.cmd" --scheme"
  recommended: true
  calculation:
    id: Endpoint_Filesystem_fillnull_process
    type: Eval
    expression: if(isnull(process) OR process="","unknown",process)
- model: Endpoint
  dataset: Processes
  source: calculated
  type: string
  description: The full command string of the spawned process. Such as C:\WINDOWS\system32\cmd.exe /c ""C:\Program Files\SplunkUniversalForwarder\etc\system\bin\powershell.cmd" --scheme"
  recommended: true
  calculation:
    id: Endpoint_Processes_fillnull_process
    type: Eval
    expression: if(isnull(process) OR process="","unknown",process)
- model: Endpoint
  dataset: Registry
  source: calculated
  type: string
  description: The full command string of the spawned process. Such as C:\WINDOWS\system32\cmd.exe /c ""C:\Program Files\SplunkUniversalForwarder\etc\system\bin\powershell.cmd" --scheme"
  recommended: true
  calculation:
    id: Endpoint_Registry_fillnull_process
    type: Eval
    expression: if(isnull(process) OR process="","unknown",process)
- model: Splunk_CIM_Validation
  dataset: Missing_Extractions_Processes
  source: declared
  type: string
