name: file_access_time
used_by:
- model: Change_Analysis
  dataset: Filesystem_Changes
  source: calculated
  type: timestamp
  description: The time the file (the object of the event) was accessed.
  recommended: true
  calculation:
    id: Filesystem_Changes_eval_file_access_time
    type: Eval
    expression: if(isnull(file_access_time) OR file_access_time="",0,file_access_time)
- model: Endpoint
  dataset: Filesystem
  source: declared
  type: timestamp
  description: The time the file (the object of the event) was accessed.
  recommended: true
- model: Splunk_CIM_Validation
  dataset: Missing_Extractions_Filesystem_Changes
  source: declared
  type: number
