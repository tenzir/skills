- name: process
  path: fieldsets/process.yaml
  title: Process
  type: group
  description: These fields contain information about a process.
  reusable:
    expected:
    - as: parent
      at: process
      full: process.parent
      description_override: Information about the parent process.
    - as: entry_leader
      at: process
      full: process.entry_leader
      description_override: First process from terminal or remote access via SSH, SSM, etc OR a service directly started by the init process.
    - as: session_leader
      at: process
      full: process.session_leader
      description_override: Often the same as entry_leader. When it differs, it represents a session started within another session. e.g. using tmux
    - as: group_leader
      at: process
      full: process.group_leader
      description_override: Information about the process group leader. In some cases this may be the same as the top level process.
    - as: group_leader
      at: process.parent
      full: process.parent.group_leader
      description_override: Information about the parent's process group leader. Only pid, start and entity_id fields are set.
    - as: parent
      at: process.entry_leader
      full: process.entry_leader.parent
      description_override: Information about the entry leader's parent process. Only pid, start and entity_id fields are set.
    - as: parent
      at: process.session_leader
      full: process.session_leader.parent
      description_override: Information about the session leader's parent process. Only pid, start and entity_id fields are set.
    - as: session_leader
      at: process.entry_leader.parent
      full: process.entry_leader.parent.session_leader
      description_override: Information about the parent session of the entry leader. Only pid, start and entity_id fields are set.
    - as: session_leader
      at: process.session_leader.parent
      full: process.session_leader.parent.session_leader
      description_override: Information about the parent session of the session leader. Only pid, start and entity_id fields are set.
    - as: previous
      at: process
      full: process.previous
      normalize:
      - array
      description_override: An array of previous executions for the process, including the initial fork. Only executable and args are set.
    - as: responsible
      at: process
      beta: This field is beta and subject to change.
      full: process.responsible
      description_override: Responsible process in macOS tracks the originating process of an app, key for understanding permissions and hierarchy.
    top_level: true
  reused_here:
  - full: process.group
    schema_name: group
    description: The effective group (egid).
  - full: process.real_group
    schema_name: group
    description: The real group (rgid).
  - full: process.saved_group
    schema_name: group
