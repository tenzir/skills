- name: container
  path: fieldsets/container.yaml
  title: Container
  type: group
  description: Fields describing the container that generated this event.
- name: data_stream
  path: fieldsets/data_stream.yaml
  title: Data Stream
  type: group
  description: The data_stream fields take part in defining the new data stream naming scheme.
  beta: These fields are in beta and are subject to change.
