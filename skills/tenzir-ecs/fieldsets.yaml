  - beta: This field reuse is beta and subject to change.
    full: process.macho
    schema_name: macho
    description: These fields contain Mac OS Mach Object file format (Mach-O) metadata.
  - full: process.entry_meta.source
    schema_name: source
    description: Remote client information such as ip, port and geo location.
  - full: process.user
    schema_name: user
    description: The effective user (euid).
  - full: process.saved_user
    schema_name: user
    description: The saved user (suid).
  - full: process.real_user
    schema_name: user
    description: The real user (ruid). Identifies the real owner of the process.
  - beta: Reusing the `user` fields in this location is currently considered beta.
    full: process.attested_user
    schema_name: user
    description: The externally attested user based on an external source such as the Kube API.
  - full: process.parent
    schema_name: process
    description: Information about the parent process.
  - full: process.entry_leader
    schema_name: process
    description: First process from terminal or remote access via SSH, SSM, etc OR a service directly started by the init process.
  - full: process.session_leader
    schema_name: process
    description: Often the same as entry_leader. When it differs, it represents a session started within another session. e.g. using tmux
  - full: process.group_leader
    schema_name: process
    description: Information about the process group leader. In some cases this may be the same as the top level process.
  - full: process.parent.group_leader
    schema_name: process
    description: Information about the parent's process group leader. Only pid, start and entity_id fields are set.
  - full: process.entry_leader.parent
    schema_name: process
    description: Information about the entry leader's parent process. Only pid, start and entity_id fields are set.
  - full: process.session_leader.parent
    schema_name: process
    description: Information about the session leader's parent process. Only pid, start and entity_id fields are set.
  - full: process.entry_leader.parent.session_leader
    schema_name: process
    description: Information about the parent session of the entry leader. Only pid, start and entity_id fields are set.
  - full: process.session_leader.parent.session_leader
    schema_name: process
    description: Information about the parent session of the session leader. Only pid, start and entity_id fields are set.
  - full: process.previous
