fieldsets:
- name: agent
  path: fieldsets/agent.yaml
  title: Agent
  type: group
  description: Fields about the monitoring agent.
- name: as
  path: fieldsets/as.yaml
  title: Autonomous System
  type: group
  description: Fields describing an Autonomous System (Internet routing prefix).
  reusable:
    expected:
    - as: as
      at: client
      full: client.as
    - as: as
      at: destination
      full: destination.as
    - as: as
      at: server
      full: server.as
    - as: as
      at: source
      full: source.as
    - as: as
      at: threat.indicator
      full: threat.indicator.as
    - as: as
      at: threat.enrichments.indicator
      full: threat.enrichments.indicator.as
    top_level: false
- name: base
  path: fieldsets/base.yaml
  title: Base
  type: group
  description: All fields defined directly at the root of the events.
- name: client
  path: fieldsets/client.yaml
  title: Client
  type: group
  description: Fields about the client side of a network connection, used with server.
  reused_here:
  - full: client.as
    schema_name: as
    description: Fields describing an Autonomous System (Internet routing prefix).
  - full: client.geo
    schema_name: geo
    description: Fields describing a location.
  - full: client.user
    schema_name: user
    description: Fields to describe the user relevant to the event.
  nestings:
  - client.as
  - client.geo
  - client.user
- name: cloud
  path: fieldsets/cloud.yaml
  title: Cloud
  type: group
  description: Fields about the cloud resource.
  reusable:
    expected:
    - as: origin
      at: cloud
      full: cloud.origin
      description_override: Provides the cloud information of the origin entity in case of an incoming request or event.
    - as: target
      at: cloud
      full: cloud.target
      description_override: Provides the cloud information of the target entity in case of an outgoing request or event.
    top_level: true
  reused_here:
  - full: cloud.entity
    schema_name: entity
    description: Fields to describe various types of entities across IT environments.
  - full: cloud.origin
    schema_name: cloud
    description: Provides the cloud information of the origin entity in case of an incoming request or event.
  - full: cloud.target
    schema_name: cloud
    description: Provides the cloud information of the target entity in case of an outgoing request or event.
  nestings:
  - cloud.entity
  - cloud.origin
  - cloud.target
- name: code_signature
  path: fieldsets/code_signature.yaml
  title: Code Signature
  type: group
  description: These fields contain information about binary code signatures.
  reusable:
    expected:
    - as: code_signature
      at: file
      full: file.code_signature
    - as: code_signature
      at: process
      full: process.code_signature
    - as: code_signature
      at: dll
      full: dll.code_signature
