- name: entity
  path: fieldsets/entity.yaml
  title: Entity
  type: group
  description: Fields to describe various types of entities across IT environments.
  reusable:
    expected:
    - as: entity
      at: user
      full: user.entity
    - as: entity
      at: cloud
      full: cloud.entity
    - as: entity
      at: host
      full: host.entity
    - as: entity
      at: service
      full: service.entity
    - as: entity
      at: orchestrator
      full: orchestrator.entity
    - as: target
      at: entity
      full: entity.target
      description_override: Targeted entity of action taken.
    top_level: true
  reused_here:
  - full: entity.relationships.administers
    schema_name: entity_reference
    description: Entities this entity administers in an IAM or ops sense.
  - full: entity.relationships.depends_on
    schema_name: entity_reference
    description: Entities this entity requires for operation.
  - full: entity.relationships.owns
    schema_name: entity_reference
    description: Identifiers of assets or identities this entity owns.
  - full: entity.relationships.supervises
    schema_name: entity_reference
    description: Identities this entity supervises in a reporting or org-chart sense.
  - full: entity.target
    schema_name: entity
    description: Targeted entity of action taken.
  nestings:
  - entity.relationships.administers
  - entity.relationships.depends_on
  - entity.relationships.owns
  - entity.relationships.supervises
  - entity.target
- name: entity_reference
  path: fieldsets/entity_reference.yaml
  title: Entity Reference
  type: group
  description: Identifier fields for referencing other entities in relationships.
  reusable:
    expected:
    - as: relationships.administers
      at: entity
      full: entity.relationships.administers
      description_override: Entities this entity administers in an IAM or ops sense.
    - as: relationships.depends_on
      at: entity
      full: entity.relationships.depends_on
      description_override: Entities this entity requires for operation.
    - as: relationships.owns
      at: entity
      full: entity.relationships.owns
      description_override: Identifiers of assets or identities this entity owns.
    - as: relationships.supervises
      at: entity
      full: entity.relationships.supervises
      description_override: Identities this entity supervises in a reporting or org-chart sense.
    top_level: false
