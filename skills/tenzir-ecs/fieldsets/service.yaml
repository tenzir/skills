fieldset: service
description: 'The service fields describe the service for or from which the data was collected.

  These fields help you find and correlate logs for a specific service and version.'
footnote: The service fields may be self-nested under service.origin.* and service.target.* to describe origin or target services in the context of incoming or outgoing requests, respectively. However, the fieldsets service.origin.* and service.target.* must not be confused with the root service fieldset that is used to describe the actual service under observation. The fieldset service.origin.* may only be used in the context of incoming requests or events to describe the originating service of the request. The fieldset service.target.* may only be used in the context of outgoing requests or events to describe the target service of the request.
group: 2
name: service
nestings:
- service.entity
- service.origin
- service.target
prefix: service.
reusable:
  expected:
  - as: origin
    at: service
    beta: Reusing the `service` fields in this location is currently considered beta.
    full: service.origin
    description_override: Describes the origin service in case of an incoming request or event.
  - as: target
    at: service
    beta: Reusing the `service` fields in this location is currently considered beta.
    full: service.target
    description_override: Describes the target service in case of an outgoing request or event.
  top_level: true
reused_here:
- full: service.entity
  schema_name: entity
  description: Fields to describe various types of entities across IT environments.
- beta: Reusing the `service` fields in this location is currently considered beta.
  full: service.origin
  schema_name: service
  description: Describes the origin service in case of an incoming request or event.
- beta: Reusing the `service` fields in this location is currently considered beta.
  full: service.target
  schema_name: service
  description: Describes the target service in case of an outgoing request or event.
