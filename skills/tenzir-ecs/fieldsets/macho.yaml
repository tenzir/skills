fieldset: macho
beta: These fields are in beta and are subject to change.
description: These fields contain Mac OS Mach Object file format (Mach-O) metadata.
group: 2
name: macho
prefix: macho.
reusable:
  expected:
  - as: macho
    at: file
    beta: This field reuse is beta and subject to change.
    full: file.macho
  - as: macho
    at: process
    beta: This field reuse is beta and subject to change.
    full: process.macho
  top_level: false
title: Mach-O Header
type: group
fields:
- name: macho.go_import_hash
  type: keyword
  description: 'A hash of the Go language imports in a Mach-O file excluding standard library imports. An import hash can be used to fingerprint binaries even after recompilation or other code-level transformations have occurred, which would change more traditional hash values.

    The algorithm used to calculate the Go symbol hash and a reference implementation are available here: https://github.com/elastic/toutoumomoma'
  template_field: true
  example: 10bddcb4cee42080f76c88d9ff964491
  ignore_above: 1024
- name: macho.go_imports
  type: flattened
  description: List of imported Go language element names and types.
  template_field: true
- name: macho.go_imports_names_entropy
  type: long
  description: Shannon entropy calculation from the list of Go imports.
  template_field: true
  format: number
- name: macho.go_imports_names_var_entropy
  type: long
  description: Variance for Shannon entropy calculation from the list of Go imports.
  template_field: true
  format: number
- name: macho.go_stripped
  type: boolean
  description: Set to true if the file is a Go executable that has had its symbols stripped or obfuscated and false if an unobfuscated Go executable.
  template_field: true
- name: macho.import_hash
  type: keyword
  description: 'A hash of the imports in a Mach-O file. An import hash can be used to fingerprint binaries even after recompilation or other code-level transformations have occurred, which would change more traditional hash values.

    This is a synonym for symhash.'
  template_field: true
  example: d41d8cd98f00b204e9800998ecf8427e
  ignore_above: 1024
- name: macho.imports
  type: flattened
  description: List of imported element names and types.
  template_field: true
  normalize:
  - array
- name: macho.imports_names_entropy
  type: long
  description: Shannon entropy calculation from the list of imported element names and types.
  template_field: true
  format: number
- name: macho.imports_names_var_entropy
  type: long
  description: Variance for Shannon entropy calculation from the list of imported element names and types.
  template_field: true
  format: number
- name: macho.sections
  type: nested
  description: 'An array containing an object for each section of the Mach-O file.

    The keys that should be present in these objects are defined by sub-fields underneath `macho.sections.*`.'
  template_field: true
  normalize:
  - array
- name: macho.sections.entropy
  type: long
  description: Shannon entropy calculation from the section.
  template_field: true
  format: number
- name: macho.sections.name
  type: keyword
  description: Mach-O Section List name.
  template_field: true
  ignore_above: 1024
- name: macho.sections.physical_size
  type: long
  description: Mach-O Section List physical size.
  template_field: true
  format: bytes
- name: macho.sections.var_entropy
  type: long
  description: Variance for Shannon entropy calculation from the section.
  template_field: true
  format: number
- name: macho.sections.virtual_size
  type: long
  description: Mach-O Section List virtual size. This is always the same as `physical_size`.
  template_field: true
  format: string
- name: macho.symhash
  type: keyword
  description: 'A hash of the imports in a Mach-O file. An import hash can be used to fingerprint binaries even after recompilation or other code-level transformations have occurred, which would change more traditional hash values.

    This is a Mach-O implementation of the Windows PE imphash'
  template_field: true
  example: d3ccf195b62a9279c3c19af1080497ec
  ignore_above: 1024
