fieldset: entity
description: The entity fields provide a standardized way to represent and categorize different types of components within an IT environment, including those that don't have dedicated field sets in ECS. An entity represents a discrete, identifiable component that can be described by a set of attributes and maintains its identity over time.
footnote: The entity fields may be self-nested under entity.target.* to describe the target entity in the context of an action or event. The fieldset entity.target.* must not be confused with the root entity fieldset that is used to describe the primary entity under observation. The fieldset entity.target.* may only be used to describe the targeted entity of an action taken.
group: 2
name: entity
nestings:
- entity.relationships.administers
- entity.relationships.depends_on
- entity.relationships.owns
- entity.relationships.supervises
- entity.target
prefix: entity.
reusable:
  expected:
  - as: entity
    at: user
    full: user.entity
  - as: entity
    at: cloud
    full: cloud.entity
  - as: entity
    at: host
    full: host.entity
  - as: entity
    at: service
    full: service.entity
  - as: entity
    at: orchestrator
    full: orchestrator.entity
  - as: target
    at: entity
    full: entity.target
    description_override: Targeted entity of action taken.
  top_level: true
reused_here:
- full: entity.relationships.administers
  schema_name: entity_reference
  description: Entities this entity administers in an IAM or ops sense.
- full: entity.relationships.depends_on
  schema_name: entity_reference
  description: Entities this entity requires for operation.
- full: entity.relationships.owns
  schema_name: entity_reference
  description: Identifiers of assets or identities this entity owns.
- full: entity.relationships.supervises
  schema_name: entity_reference
  description: Identities this entity supervises in a reporting or org-chart sense.
- full: entity.target
  schema_name: entity
  description: Targeted entity of action taken.
