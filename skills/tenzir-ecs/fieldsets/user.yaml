fieldset: user
description: 'The user fields describe information about the user that is relevant to the event.

  Fields can have one entry or multiple entries. If a user has more than one id, provide an array that includes all of them.'
group: 2
name: user
nestings:
- user.changes
- user.effective
- user.entity
- user.group
- user.risk
- user.target
prefix: user.
reusable:
  expected:
  - as: user
    at: client
    full: client.user
  - as: user
    at: destination
    full: destination.user
  - as: user
    at: server
    full: server.user
  - as: user
    at: source
    full: source.user
  - as: target
    at: user
    full: user.target
    description_override: Targeted user of action taken.
  - as: effective
    at: user
    full: user.effective
    description_override: User whose privileges were assumed.
  - as: changes
    at: user
    full: user.changes
    description_override: Captures changes made to a user.
  - as: user
    at: process
    full: process.user
    description_override: The effective user (euid).
  - as: saved_user
    at: process
    full: process.saved_user
    description_override: The saved user (suid).
  - as: real_user
    at: process
    full: process.real_user
    description_override: The real user (ruid). Identifies the real owner of the process.
  - as: attested_user
    at: process
    beta: Reusing the `user` fields in this location is currently considered beta.
    full: process.attested_user
    description_override: The externally attested user based on an external source such as the Kube API.
  top_level: true
reused_here:
- full: user.group
  schema_name: group
  description: User's group relevant to the event.
- full: user.entity
  schema_name: entity
  description: Fields to describe various types of entities across IT environments.
- full: user.risk
  schema_name: risk
  description: Fields for describing risk score and level.
- full: user.target
  schema_name: user
  description: Targeted user of action taken.
- full: user.effective
  schema_name: user
  description: User whose privileges were assumed.
- full: user.changes
  schema_name: user
  description: Captures changes made to a user.
