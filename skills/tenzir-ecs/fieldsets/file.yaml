fieldset: file
description: 'A file is defined as a set of information that has been created on, or has existed on a filesystem.

  File objects can be associated with host events, network events, and/or file events (e.g., those produced by File Integrity Monitoring [FIM] products or services). File fields provide details about the affected file associated with the event or metric.'
group: 2
name: file
nestings:
- file.code_signature
- file.elf
- file.hash
- file.macho
- file.pe
- file.x509
prefix: file.
reusable:
  expected:
  - as: file
    at: threat.indicator
    full: threat.indicator.file
  - as: file
    at: threat.enrichments.indicator
    full: threat.enrichments.indicator.file
  top_level: true
reused_here:
- full: file.hash
  schema_name: hash
  description: Hashes, usually file hashes.
- full: file.pe
  schema_name: pe
  description: These fields contain Windows Portable Executable (PE) metadata.
- full: file.x509
  schema_name: x509
  description: These fields contain x509 certificate metadata.
- full: file.code_signature
  schema_name: code_signature
  description: These fields contain information about binary code signatures.
- full: file.elf
  schema_name: elf
  description: These fields contain Linux Executable Linkable Format (ELF) metadata.
- beta: This field reuse is beta and subject to change.
  full: file.macho
  schema_name: macho
  description: These fields contain Mac OS Mach Object file format (Mach-O) metadata.
title: File
type: group
