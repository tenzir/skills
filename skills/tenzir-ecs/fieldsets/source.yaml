fieldset: source
description: 'Source fields capture details about the sender of a network exchange/packet. These fields are populated from a network event, packet, or other event containing details of a network transaction.

  Source fields are usually populated in conjunction with destination fields. The source and destination fields are considered the baseline and should always be filled if an event contains source and destination details from a network transaction. If the event also contains identification of the client and server roles, then the client and server fields should also be populated.'
group: 2
name: source
nestings:
- source.as
- source.geo
- source.user
prefix: source.
reusable:
  expected:
  - as: source
    at: process.entry_meta
    full: process.entry_meta.source
    description_override: Remote client information such as ip, port and geo location.
  top_level: true
reused_here:
- full: source.as
  schema_name: as
  description: Fields describing an Autonomous System (Internet routing prefix).
- full: source.geo
  schema_name: geo
  description: Fields describing a location.
- full: source.user
  schema_name: user
  description: Fields to describe the user relevant to the event.
title: Source
type: group
fields:
- name: source.address
  type: keyword
  description: Source network address.
- name: source.as.number
  type: long
  description: Unique number allocated to the autonomous system.
  original_fieldset: as
- name: source.as.organization.name
  type: keyword
  description: Organization name.
  original_fieldset: as
- name: source.bytes
  type: long
  description: Bytes sent from the source to the destination.
- name: source.domain
  type: keyword
  description: The domain name of the source.
- name: source.geo.city_name
  type: keyword
  description: City name.
  original_fieldset: geo
- name: source.geo.continent_code
  type: keyword
  description: Continent code.
  original_fieldset: geo
- name: source.geo.continent_name
  type: keyword
  description: Name of the continent.
  original_fieldset: geo
- name: source.geo.country_iso_code
  type: keyword
  description: Country ISO code.
  original_fieldset: geo
- name: source.geo.country_name
  type: keyword
  description: Country name.
  original_fieldset: geo
- name: source.geo.location
  type: geo_point
  description: Longitude and latitude.
  original_fieldset: geo
- name: source.geo.name
  type: keyword
  description: User-defined description of a location.
  original_fieldset: geo
- name: source.geo.postal_code
  type: keyword
  description: Postal code.
  original_fieldset: geo
- name: source.geo.region_iso_code
  type: keyword
  description: Region ISO code.
  original_fieldset: geo
- name: source.geo.region_name
  type: keyword
  description: Region name.
  original_fieldset: geo
- name: source.geo.timezone
  type: keyword
  description: Time zone.
  original_fieldset: geo
- name: source.ip
  type: ip
  description: IP address of the source.
- name: source.mac
  type: keyword
  description: MAC address of the source.
- name: source.nat.ip
  type: ip
  description: Source NAT ip
- name: source.nat.port
  type: long
  description: Source NAT port
- name: source.packets
  type: long
  description: Packets sent from the source to the destination.
- name: source.port
  type: long
  description: Port of the source.
- name: source.registered_domain
  type: keyword
  description: The highest registered source domain, stripped of the subdomain.
- name: source.subdomain
  type: keyword
  description: The subdomain of the domain.
- name: source.top_level_domain
  type: keyword
  description: The effective top level domain (com, org, net, co.uk).
- name: source.user.domain
  type: keyword
  description: Name of the directory the user is a member of.
  original_fieldset: user
- name: source.user.email
  type: keyword
  description: User email address.
  original_fieldset: user
- name: source.user.full_name
  type: keyword
  description: User's full name, if available.
  original_fieldset: user
- name: source.user.group.domain
  type: keyword
  description: Name of the directory the group is a member of.
  original_fieldset: group
- name: source.user.group.id
  type: keyword
  description: Unique identifier for the group on the system/platform.
  original_fieldset: group
- name: source.user.group.name
  type: keyword
  description: Name of the group.
  original_fieldset: group
- name: source.user.hash
  type: keyword
  description: Unique user hash to correlate information for a user in anonymized form.
  original_fieldset: user
- name: source.user.id
  type: keyword
  description: Unique identifier of the user.
  original_fieldset: user
- name: source.user.name
  type: keyword
  description: Short name or login of the user.
  original_fieldset: user
- name: source.user.roles
  type: keyword
  description: Array of user roles at the time of the event.
  original_fieldset: user
  normalize:
  - array
