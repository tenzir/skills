  description: Rule category
- name: rule.description
  type: keyword
  description: Rule description
- name: rule.id
  type: keyword
  description: Rule ID
- name: rule.license
  type: keyword
  description: Rule license
- name: rule.name
  type: keyword
  description: Rule name
- name: rule.reference
  type: keyword
  description: Rule reference URL
- name: rule.ruleset
  type: keyword
  description: Rule ruleset
- name: rule.uuid
  type: keyword
  description: Rule UUID
- name: rule.version
  type: keyword
  description: Rule version
