fieldset: tracing
description: 'Distributed tracing makes it possible to analyze performance throughout a microservice architecture all in one view. This is accomplished by tracing all of the requests - from the initial web request in the front-end service - to queries made through multiple back-end services.

  Unlike most field sets in ECS, the tracing fields are *not* nested under the field set name. In other words, the correct field name is `trace.id`, not `tracing.trace.id`, and so on.'
group: 2
name: tracing
prefix: ''
root: true
title: Tracing
type: group
fields:
- name: span.id
  type: keyword
  description: Unique identifier of the span within the scope of its trace.
- name: trace.id
  type: keyword
  description: Unique identifier of the trace.
- name: transaction.id
  type: keyword
  description: Unique identifier of the transaction within the scope of its trace.
