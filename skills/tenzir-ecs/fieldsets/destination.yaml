fieldset: destination
description: 'Destination fields capture details about the receiver of a network exchange/packet. These fields are populated from a network event, packet, or other event containing details of a network transaction.

  Destination fields are usually populated in conjunction with source fields. The source and destination fields are considered the baseline and should always be filled if an event contains source and destination details from a network transaction. If the event also contains identification of the client and server roles, then the client and server fields should also be populated.'
group: 2
name: destination
nestings:
- destination.as
- destination.geo
- destination.user
prefix: destination.
reused_here:
- full: destination.as
  schema_name: as
  description: Fields describing an Autonomous System (Internet routing prefix).
- full: destination.geo
  schema_name: geo
  description: Fields describing a location.
- full: destination.user
  schema_name: user
  description: Fields to describe the user relevant to the event.
title: Destination
type: group
fields:
- name: destination.address
  type: keyword
  description: Destination network address.
- name: destination.as.number
  type: long
  description: Unique number allocated to the autonomous system.
  original_fieldset: as
- name: destination.as.organization.name
  type: keyword
  description: Organization name.
  original_fieldset: as
- name: destination.bytes
  type: long
  description: Bytes sent from the destination to the source.
- name: destination.domain
