fieldset: x509
description: 'This implements the common core fields for x509 certificates. This information is likely logged with TLS sessions, digital signatures found in executable binaries, S/MIME information in email bodies, or analysis of files on disk.

  When the certificate relates to a file, use the fields at `file.x509`. When hashes of the DER-encoded certificate are available, the `hash` data set should be populated as well (e.g. `file.hash.sha256`).

  Events that contain certificate information about network connections, should use the x509 fields under the relevant TLS fields: `tls.server.x509` and/or `tls.client.x509`.'
group: 2
name: x509
prefix: x509.
reusable:
  expected:
  - as: x509
    at: file
    full: file.x509
  - as: x509
    at: threat.indicator
    full: threat.indicator.x509
  - as: x509
    at: threat.enrichments.indicator
    full: threat.enrichments.indicator.x509
  - as: x509
    at: tls.client
    full: tls.client.x509
  - as: x509
    at: tls.server
    full: tls.server.x509
  top_level: false
title: x509 Certificate
type: group
fields:
- name: x509.alternative_names
  type: keyword
  description: List of subject alternative names (SAN). Name types vary by certificate authority and certificate type but commonly contain IP addresses, DNS names (and wildcards), and email addresses.
  template_field: true
  example: '*.elastic.co'
  ignore_above: 1024
  normalize:
  - array
- name: x509.issuer.common_name
  type: keyword
  description: List of common name (CN) of issuing certificate authority.
  template_field: true
  example: Example SHA2 High Assurance Server CA
  ignore_above: 1024
  normalize:
  - array
- name: x509.issuer.country
  type: keyword
  description: List of country \(C) codes
  template_field: true
  example: US
  ignore_above: 1024
  normalize:
  - array
- name: x509.issuer.distinguished_name
  type: keyword
  description: Distinguished name (DN) of issuing certificate authority.
  template_field: true
  example: C=US, O=Example Inc, OU=www.example.com, CN=Example SHA2 High Assurance Server CA
  ignore_above: 1024
- name: x509.issuer.locality
  type: keyword
  description: List of locality names (L)
  template_field: true
  example: Mountain View
  ignore_above: 1024
  normalize:
  - array
- name: x509.issuer.organization
  type: keyword
  description: List of organizations (O) of issuing certificate authority.
  template_field: true
  example: Example Inc
  ignore_above: 1024
  normalize:
  - array
- name: x509.issuer.organizational_unit
  type: keyword
  description: List of organizational units (OU) of issuing certificate authority.
  template_field: true
  example: www.example.com
  ignore_above: 1024
  normalize:
  - array
- name: x509.issuer.state_or_province
  type: keyword
  description: List of state or province names (ST, S, or P)
  template_field: true
  example: California
  ignore_above: 1024
  normalize:
  - array
- name: x509.not_after
  type: date
  description: Time at which the certificate is no longer considered valid.
  template_field: true
  example: '2020-07-16T03:15:39Z'
- name: x509.not_before
  type: date
  description: Time at which the certificate is first considered valid.
  template_field: true
  example: '2019-08-16T01:40:25Z'
- name: x509.public_key_algorithm
  type: keyword
  description: Algorithm used to generate the public key.
  template_field: true
  example: RSA
  ignore_above: 1024
- name: x509.public_key_curve
  type: keyword
  description: The curve used by the elliptic curve public key algorithm. This is algorithm specific.
  template_field: true
  example: nistp521
  ignore_above: 1024
- name: x509.public_key_exponent
  type: long
  description: Exponent used to derive the public key. This is algorithm specific.
  template_field: true
  example: 65537
- name: x509.public_key_size
  type: long
  description: The size of the public key space in bits.
  template_field: true
  example: 2048
- name: x509.serial_number
  type: keyword
  description: Unique serial number issued by the certificate authority. For consistency, this must be encoded in base 16 and formatted without colons and uppercase characters.
  template_field: true
  example: 55FBB9C7DEBF09809D12CCAA
  ignore_above: 1024
- name: x509.signature_algorithm
  type: keyword
  description: Identifier for certificate signature algorithm. We recommend using names found in Go Lang Crypto library. See https://github.com/golang/go/blob/go1.14/src/crypto/x509/x509.go#L337-L353.
  template_field: true
  example: SHA256-RSA
  ignore_above: 1024
- name: x509.subject.common_name
  type: keyword
  description: List of common names (CN) of subject.
  template_field: true
  example: shared.global.example.net
  ignore_above: 1024
  normalize:
  - array
- name: x509.subject.country
  type: keyword
  description: List of country \(C) code
  template_field: true
  example: US
  ignore_above: 1024
  normalize:
  - array
- name: x509.subject.distinguished_name
  type: keyword
  description: Distinguished name (DN) of the certificate subject entity.
  template_field: true
  example: C=US, ST=California, L=San Francisco, O=Example, Inc., CN=shared.global.example.net
  ignore_above: 1024
- name: x509.subject.locality
  type: keyword
  description: List of locality names (L)
  template_field: true
  example: San Francisco
  ignore_above: 1024
  normalize:
  - array
- name: x509.subject.organization
  type: keyword
  description: List of organizations (O) of subject.
  template_field: true
  example: Example, Inc.
  ignore_above: 1024
  normalize:
  - array
- name: x509.subject.organizational_unit
  type: keyword
  description: List of organizational units (OU) of subject.
  template_field: true
  ignore_above: 1024
  normalize:
  - array
- name: x509.subject.state_or_province
  type: keyword
  description: List of state or province names (ST, S, or P)
  template_field: true
  example: California
  ignore_above: 1024
  normalize:
  - array
- name: x509.version_number
  type: keyword
  description: Version of x509 format.
  template_field: true
  example: 3
  ignore_above: 1024
