field: dns.question.top_level_domain
fieldset: dns
dashed_name: dns-question-top-level-domain
description: 'The effective top level domain (eTLD), also known as the domain suffix, is the last part of the domain name. For example, the top level domain for example.com is "com".

  This value can be determined precisely with a list like the public suffix list (https://publicsuffix.org). Trying to approximate this by simply taking the last label will not work well for effective TLDs such as "co.uk".'
example: co.uk
flat_name: dns.question.top_level_domain
ignore_above: 1024
