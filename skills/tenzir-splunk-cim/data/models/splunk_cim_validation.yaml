name: Splunk_CIM_Validation
display_name: CIM Validation (S.o.S.)
description: This data model is to help check adoption into the CIM. It provides useful objects for making sure things are tagged appropriately and verify key fields for the different models are not missing.
root_datasets:
- Alerts
- Application_State
- Authentication
- Certificates
- Change_Analysis
- Compute_Inventory
- Databases
- Email
- Interprocess_Messaging
- Intrusion_Detection
- JVM
- Malware
- Network_Resolution
- Network_Sessions
- Network_Traffic
- Performance
- Splunk_Audit
- Ticket_Management
- Updates
- Vulnerabilities
- Web
- Untagged_Events
datasets:
  Alerts:
    kind: search
    fields:
      _time:
        source: declared
        type: timestamp
      host:
        source: declared
        type: string
      source:
        source: declared
        type: string
      sourcetype:
        source: declared
        type: string
    inherits:
    - BaseSearch
    search: '| datamodel Alerts Alerts search'
  Application_State:
