name: Endpoint
description: Endpoint Data Model
root_datasets:
- Ports
- Processes
- Services
- Filesystem
- Registry
datasets:
  Ports:
    kind: search
    tags:
    - listening
    - port
    fields:
      _time:
        source: base
        defined_in: BaseSearch
      cim_entity_zone:
        source: declared
        defined_in: Ports
        type: string
        description: This field is automatically provided by asset and identity correlation features of applications like Splunk Enterprise Security. Do not define extractions for this field when writing add-ons.
      creation_time:
        source: declared
        defined_in: Ports
        type: timestamp
        description: The time at which the network port started listening on the endpoint.
      dest:
        source: calculated
        defined_in: Ports
        type: string
        description: The endpoint for which the port is listening on.
        recommended: true
        calculation:
          id: Endpoint_Ports_fillnull_dest
          type: Eval
          expression: if(isnull(dest) OR dest="","unknown",dest)
      dest_bunit:
        source: declared
        defined_in: Ports
        type: string
        description: This field is automatically provided by asset and identity correlation features of applications like Splunk Enterprise Security. Do not define extractions for this field when writing add-ons.
      dest_category:
        source: declared
        defined_in: Ports
        type: string
        description: This field is automatically provided by asset and identity correlation features of applications like Splunk Enterprise Security. Do not define extractions for this field when writing add-ons.
        multivalue: true
      dest_port:
        source: declared
        defined_in: Ports
        type: number
        description: Network port listening on the endpoint, such as 53.
        recommended: true
      dest_priority:
        source: declared
        defined_in: Ports
        type: string
        description: This field is automatically provided by asset and identity correlation features of applications like Splunk Enterprise Security. Do not define extractions for this field when writing add-ons.
      dest_requires_av:
        source: declared
        defined_in: Ports
        type: boolean
        description: This field is automatically provided by asset and identity correlation features of applications like Splunk Enterprise Security. Do not define extractions for this field when writing add-ons.
      dest_should_timesync:
        source: declared
        defined_in: Ports
        type: boolean
        description: This field is automatically provided by asset and identity correlation features of applications like Splunk Enterprise Security. Do not define extractions for this field when writing add-ons.
      dest_should_update:
        source: declared
        defined_in: Ports
        type: boolean
        description: This field is automatically provided by asset and identity correlation features of applications like Splunk Enterprise Security. Do not define extractions for this field when writing add-ons.
      host:
        source: base
        defined_in: BaseSearch
      process_guid:
        source: declared
        defined_in: Ports
        type: string
        description: The globally unique identifier of the process assigned by the vendor_product.
      process_id:
        source: declared
        defined_in: Ports
        type: string
        description: The numeric identifier of the process assigned by the operating system.
      source:
        source: base
        defined_in: BaseSearch
      sourcetype:
        source: base
        defined_in: BaseSearch
      src:
        source: calculated
        defined_in: Ports
        type: string
        description: The "remote" system connected to the listening port (if applicable).
        recommended: true
        calculation:
          id: Endpoint_Ports_fillnull_src
          type: Eval
          expression: if(isnull(src) OR src="","unknown",src)
      src_bunit:
        source: declared
        defined_in: Ports
        type: string
        description: This field is automatically provided by asset and identity correlation features of applications like Splunk Enterprise Security. Do not define extractions for this field when writing add-ons.
      src_category:
        source: declared
        defined_in: Ports
        type: string
        description: This field is automatically provided by asset and identity correlation features of applications like Splunk Enterprise Security. Do not define extractions for this field when writing add-ons.
        multivalue: true
      src_port:
        source: calculated
        defined_in: Ports
        type: number
        description: The "remote" port connected to the listening port (if applicable).
        recommended: true
        calculation:
          id: Endpoint_Ports_fillnull_src_port
          type: Eval
          expression: if(isnum(src_port),src_port,0)
      src_priority:
        source: declared
        defined_in: Ports
        type: string
        description: This field is automatically provided by asset and identity correlation features of applications like Splunk Enterprise Security. Do not define extractions for this field when writing add-ons.
      src_requires_av:
        source: declared
        defined_in: Ports
        type: boolean
        description: This field is automatically provided by asset and identity correlation features of applications like Splunk Enterprise Security. Do not define extractions for this field when writing add-ons.
      src_should_timesync:
        source: declared
        defined_in: Ports
        type: boolean
        description: This field is automatically provided by asset and identity correlation features of applications like Splunk Enterprise Security. Do not define extractions for this field when writing add-ons.
      src_should_update:
        source: declared
        defined_in: Ports
        type: boolean
        description: This field is automatically provided by asset and identity correlation features of applications like Splunk Enterprise Security. Do not define extractions for this field when writing add-ons.
      state:
        source: declared
        defined_in: Ports
        type: string
        description: The status of the listening port, such as established, listening, etc.
      tag:
        source: declared
        defined_in: Ports
        type: string
        description: This automatically generated field is used to access tags from within data models. Add-on builders do not need to populate it.
        multivalue: true
      transport:
        source: declared
        defined_in: Ports
        type: string
        description: The network transport protocol associated with the listening port, such as tcp, udp, etc.
        recommended: true
      transport_dest_port:
        source: declared
        defined_in: Ports
        type: string
        description: Calculated as transport/dest_port, such as tcp/53.
      user:
        source: calculated
        defined_in: Ports
        type: string
        description: The user account associated with the listening port.
        recommended: true
        calculation:
          id: Endpoint_Ports_fillnull_user
          type: Eval
          expression: if(isnull(user) OR user="","unknown",user)
      user_bunit:
        source: declared
        defined_in: Ports
        type: string
        description: This field is automatically provided by asset and identity correlation features of applications like Splunk Enterprise Security. Do not define extractions for this field when writing add-ons.
      user_category:
        source: declared
        defined_in: Ports
        type: string
        description: This field is automatically provided by asset and identity correlation features of applications like Splunk Enterprise Security. Do not define extractions for this field when writing add-ons.
        multivalue: true
      user_priority:
        source: declared
        defined_in: Ports
        type: string
        description: This field is automatically provided by asset and identity correlation features of applications like Splunk Enterprise Security. Do not define extractions for this field when writing add-ons.
      vendor_product:
        source: calculated
        defined_in: Ports
        type: string
        description: The vendor and product name of the Endpoint solution that reported the event, such as Carbon Black Cb Response. This field can be automatically populated by vendor and product fields in your data.
        recommended: true
        calculation:
          id: Endpoint_Ports_vendor_product
          type: Eval
          expression: case(isnotnull(vendor_product),vendor_product,isnotnull(vendor) AND vendor!="unknown" AND isnotnull(product) AND product!="unknown",vendor." ".product,isnotnull(vendor) AND vendor!="unknown" AND (isnull(product) OR product="unknown"),vendor." unknown",(isnull(vendor) OR vendor="unknown") AND isnotnull(product) AND product!="unknown","unknown ".product,isnotnull(sourcetype),sourcetype,1=1,"unknown")
    inherits:
    - BaseSearch
    search: (`cim_Endpoint_indexes`) tag=listening tag=port | eval transport=if(isnull(transport) OR transport="","unknown",transport),dest_port=if(isnull(dest_port) OR dest_port="",0,dest_port),transport_dest_port=mvzip(transport,dest_port,"/") | mvexpand transport_dest_port
  Processes:
    kind: search
    tags:
    - process
    - report
    fields:
      _time:
        source: base
        defined_in: BaseSearch
      action:
        source: declared
        defined_in: Processes
        type: string
        description: The action taken by the endpoint.
      cim_entity_zone:
        source: declared
        defined_in: Processes
        type: string
        description: This field is automatically provided by asset and identity correlation features of applications like Splunk Enterprise Security. Do not define extractions for this field when writing add-ons.
      cpu_load_percent:
        source: declared
        defined_in: Processes
        type: number
        description: CPU load consumed by the process (in percent).
      dest:
        source: calculated
        defined_in: Processes
        type: string
        description: The endpoint for which the process was spawned.
        recommended: true
        calculation:
          id: Endpoint_Processes_fillnull_dest
          type: Eval
          expression: if(isnull(dest) OR dest="","unknown",dest)
      dest_bunit:
        source: declared
        defined_in: Processes
        type: string
        description: This field is automatically provided by asset and identity correlation features of applications like Splunk Enterprise Security. Do not define extractions for this field when writing add-ons.
      dest_category:
        source: declared
        defined_in: Processes
        type: string
        description: This field is automatically provided by asset and identity correlation features of applications like Splunk Enterprise Security. Do not define extractions for this field when writing add-ons.
        multivalue: true
      dest_is_expected:
        source: declared
        defined_in: Processes
        type: boolean
        description: This field is automatically provided by asset and identity correlation features of applications like Splunk Enterprise Security. Do not define extractions for this field when writing add-ons.
      dest_priority:
        source: declared
        defined_in: Processes
        type: string
        description: This field is automatically provided by asset and identity correlation features of applications like Splunk Enterprise Security. Do not define extractions for this field when writing add-ons.
      dest_requires_av:
        source: declared
        defined_in: Processes
        type: boolean
        description: This field is automatically provided by asset and identity correlation features of applications like Splunk Enterprise Security. Do not define extractions for this field when writing add-ons.
      dest_should_timesync:
        source: declared
        defined_in: Processes
        type: boolean
        description: This field is automatically provided by asset and identity correlation features of applications like Splunk Enterprise Security. Do not define extractions for this field when writing add-ons.
      dest_should_update:
        source: declared
        defined_in: Processes
        type: boolean
        description: This field is automatically provided by asset and identity correlation features of applications like Splunk Enterprise Security. Do not define extractions for this field when writing add-ons.
      host:
        source: base
        defined_in: BaseSearch
      loaded_file:
        source: calculated
        defined_in: Processes
        type: string
        description: The file that was loaded.
        recommended: true
        calculation:
          id: Endpoint_Processes_fillnull_loaded_file
          type: Eval
          expression: if(isnull(loaded_file) OR loaded_file="","unknown",loaded_file)
      mem_used:
        source: declared
        defined_in: Processes
        type: number
        description: Memory used by the process (in bytes).
      original_file_name:
        source: calculated
        defined_in: Processes
        type: string
        description: Original name of the file, not including path. Sometimes this field is similar to process name but the two do not always match, such as process_name=pwsh and original_file_name=powershell.exe to detect renamed instances of any process executing.
        recommended: true
        calculation:
          id: Endpoint_Processes_fillnull_original_file_name
          type: Eval
          expression: if(isnull(original_file_name) OR original_file_name="","unknown",original_file_name)
      os:
        source: declared
        defined_in: Processes
        type: string
        description: The operating system of the resource, such as Microsoft Windows Server 2008r2.
      parent_process:
        source: calculated
        defined_in: Processes
        type: string
        description: The full command string of the parent process
        recommended: true
        calculation:
          id: Endpoint_Processes_fillnull_parent_process
          type: Eval
          expression: if(isnull(parent_process) OR parent_process="","unknown",parent_process)
      parent_process_exec:
        source: declared
        defined_in: Processes
        type: string
        description: The executable name of the parent process.
      parent_process_guid:
        source: declared
        defined_in: Processes
        type: string
        description: The globally unique identifier of the parent process assigned by the vendor_product.
      parent_process_hash:
        source: declared
        defined_in: Processes
        type: string
        description: The digest(s) of the parent process, such as <md5>, <sha1>, etc.
        multivalue: true
      parent_process_id:
        source: declared
        defined_in: Processes
        type: number
        description: The numeric identifier of the parent process assigned by the operating system.
      parent_process_name:
        source: calculated
        defined_in: Processes
        type: string
        description: The friendly name of the parent process, such as notepad.exe.
        recommended: true
        calculation:
          id: Endpoint_Processes_fillnull_parent_process_name
          type: Eval
          expression: case(isnotnull(parent_process_name) AND parent_process_name!="", parent_process_name, isnotnull(parent_process) AND parent_process!="" AND match(parent_process, "^\s*(?:\"..*\\\([^\"]+)\").*"), replace( parent_process, "^\s*(?:\"..*\\\([^\"]+)\").*", "\1" ), isnotnull(parent_process) AND parent_process!="" AND match(parent_process, "^(?:..*\\\)?([^\s\"]+)(?=\s|$).*"), replace( parent_process, "^(?:..*\\\)?([^\s\"]+)(?=\s|$).*", "\1" ), 1=1, "unknown")
      parent_process_path:
        source: declared
        defined_in: Processes
        type: string
        description: The file path of the parent process, such as C:\Windows\System32\notepad.exe.
      parent_user:
        source: calculated
        defined_in: Processes
        type: string
        description: The original user under which the process was created. This field is extracted for example when the process was originally created under one user's account (this CIM field) but a new process is spawned belonging to another user (the "user" CIM field)
        calculation:
          id: Endpoint_Processes_fillnull_parent_user
          type: Eval
          expression: if(isnull(parent_user) OR parent_user="","unknown",parent_user)
      process:
        source: calculated
        defined_in: Processes
        type: string
        description: The full command string of the spawned process. Such as C:\WINDOWS\system32\cmd.exe /c ""C:\Program Files\SplunkUniversalForwarder\etc\system\bin\powershell.cmd" --scheme"
        recommended: true
        calculation:
          id: Endpoint_Processes_fillnull_process
          type: Eval
          expression: if(isnull(process) OR process="","unknown",process)
      process_current_directory:
        source: declared
        defined_in: Processes
        type: string
        description: The current working directory used to spawn the process.
      process_exec:
        source: declared
        defined_in: Processes
        type: string
        description: The executable name of the process.
      process_guid:
        source: declared
        defined_in: Processes
        type: string
        description: The globally unique identifier of the process assigned by the vendor_product.
      process_hash:
        source: declared
        defined_in: Processes
        type: string
        description: The digest(s) of the process, such as <md5>, <sha1>, etc.
        multivalue: true
      process_id:
        source: declared
        defined_in: Processes
        type: number
        description: The numeric identifier of the process assigned by the operating system.
      process_integrity_level:
        source: declared
        defined_in: Processes
        type: string
        description: The integrity level of the process.
        expected_values:
        - protected process
        - system
        - high
        - medium high
        - medium
        - low
        - untrusted
      process_name:
        source: calculated
        defined_in: Processes
        type: string
        description: The friendly name of the process, such as notepad.exe.
        recommended: true
        calculation:
          id: Endpoint_Processes_fillnull_process_name
          type: Eval
          expression: case(isnotnull(process_name) AND process_name!="", process_name, isnotnull(process) AND process!="" AND match(process, "^\s*(?:\"..*\\\([^\"]+)\").*"), replace( process, "^\s*(?:\"..*\\\([^\"]+)\").*", "\1" ), isnotnull(process) AND process!="" AND match(process, "^(?:..*\\\)?([^\s\"]+)(?=\s|$).*"), replace( process, "^(?:..*\\\)?([^\s\"]+)(?=\s|$).*", "\1" ), 1=1, "unknown")
      process_path:
        source: declared
        defined_in: Processes
        type: string
        description: The file path of the process, such as C:\Windows\System32\notepad.exe.
      source:
        source: base
        defined_in: BaseSearch
      sourcetype:
        source: base
        defined_in: BaseSearch
      tag:
        source: declared
        defined_in: Processes
        type: string
        description: This automatically generated field is used to access tags from within data models. Add-on builders do not need to populate it.
        multivalue: true
      user:
        source: calculated
        defined_in: Processes
        type: string
        description: The current user linked to the running process.
        recommended: true
        calculation:
          id: Endpoint_Processes_fillnull_user
          type: Eval
          expression: if(isnull(user) OR user="","unknown",user)
      user_bunit:
        source: declared
        defined_in: Processes
        type: string
        description: This field is automatically provided by asset and identity correlation features of applications like Splunk Enterprise Security. Do not define extractions for this field when writing add-ons.
      user_category:
        source: declared
        defined_in: Processes
        type: string
        description: This field is automatically provided by asset and identity correlation features of applications like Splunk Enterprise Security. Do not define extractions for this field when writing add-ons.
        multivalue: true
      user_id:
        source: declared
        defined_in: Processes
        type: string
        description: The unique identifier of the user account which spawned the process.
      user_priority:
        source: declared
        defined_in: Processes
        type: string
        description: This field is automatically provided by asset and identity correlation features of applications like Splunk Enterprise Security. Do not define extractions for this field when writing add-ons.
      vendor_product:
        source: calculated
        defined_in: Processes
        type: string
        description: The vendor and product name of the Endpoint solution that reported the event, such as Carbon Black Cb Response. This field can be automatically populated by vendor and product fields in your data.
        recommended: true
        calculation:
          id: Endpoint_Processes_vendor_product
          type: Eval
          expression: case(isnotnull(vendor_product),vendor_product,isnotnull(vendor) AND vendor!="unknown" AND isnotnull(product) AND product!="unknown",vendor." ".product,isnotnull(vendor) AND vendor!="unknown" AND (isnull(product) OR product="unknown"),vendor." unknown",(isnull(vendor) OR vendor="unknown") AND isnotnull(product) AND product!="unknown","unknown ".product,isnotnull(sourcetype),sourcetype,1=1,"unknown")
    inherits:
    - BaseSearch
    search: (`cim_Endpoint_indexes`) tag=process tag=report | eval process_integrity_level=lower(process_integrity_level)
