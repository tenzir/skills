name: JVM
description: Java Virtual Machine Data Model
root_datasets:
- JVM
datasets:
  JVM:
    kind: event
    tags:
    - jvm
    constraints:
    - (`cim_JVM_indexes`) tag=jvm
    fields:
      _time:
        source: base
        defined_in: BaseEvent
      cim_entity_zone:
        source: declared
        defined_in: JVM
        type: string
        description: This field is automatically provided by asset and identity correlation features of applications like Splunk Enterprise Security. Do not define extractions for this field when writing add-ons.
      host:
        source: base
        defined_in: BaseEvent
      jvm_description:
        source: declared
        defined_in: JVM
        type: string
        description: A description field provided in some data sources.
      source:
        source: base
        defined_in: BaseEvent
      sourcetype:
        source: base
        defined_in: BaseEvent
      tag:
        source: declared
        defined_in: JVM
        type: string
        description: This automatically generated field is used to access tags from within data models. Add-on builders do not need to populate it.
        multivalue: true
    inherits:
    - BaseEvent
    children:
    - Classloading
    - Compilation
    - Memory
    - OS
    - Runtime
    - Threading
  Threading:
    kind: event
    tags:
    - jvm
    - threading
    constraints:
    - tag=threading
    fields:
      _time:
        source: inherited
        defined_in: BaseEvent
        inherited_from: JVM
      cim_entity_zone:
        source: inherited
        defined_in: JVM
        inherited_from: JVM
        type: string
        description: This field is automatically provided by asset and identity correlation features of applications like Splunk Enterprise Security. Do not define extractions for this field when writing add-ons.
      cm_enabled:
        source: declared
        defined_in: Threading
        type: boolean
        description: Indicates whether thread contention monitoring is enabled.
        expected_values:
        - 'true'
        - 'false'
        - '1'
        - '0'
      cm_supported:
        source: declared
        defined_in: Threading
        type: boolean
        description: Indicates whether the JVM supports thread contention monitoring.
        expected_values:
        - 'true'
        - 'false'
        - '1'
        - '0'
      cpu_time_enabled:
        source: declared
        defined_in: Threading
        type: boolean
        description: Indicates whether thread CPU time measurement is enabled.
        expected_values:
        - 'true'
        - 'false'
        - '1'
        - '0'
      cpu_time_supported:
        source: declared
        defined_in: Threading
        type: boolean
        description: Indicates whether the Java virtual machine supports CPU time measurement for the current thread.
        expected_values:
        - 'true'
        - 'false'
        - '1'
        - '0'
      current_cpu_time:
        source: declared
        defined_in: Threading
        type: number
        description: CPU-space time taken by the JVM, in seconds.
      current_user_time:
        source: declared
        defined_in: Threading
        type: number
        description: User-space time taken by the JVM, in seconds.
      daemon_thread_count:
        source: declared
        defined_in: Threading
        type: number
        description: The JVM's current daemon count.
      host:
        source: inherited
        defined_in: BaseEvent
        inherited_from: JVM
      jvm_description:
        source: inherited
        defined_in: JVM
        inherited_from: JVM
        type: string
        description: A description field provided in some data sources.
      omu_supported:
        source: declared
        defined_in: Threading
        type: boolean
        description: Indicates whether the JVM supports monitoring of object monitor usage.
        expected_values:
        - 'true'
        - 'false'
        - '1'
        - '0'
      peak_thread_count:
        source: declared
        defined_in: Threading
        type: number
        description: The JVM's peak thread count.
      source:
        source: inherited
        defined_in: BaseEvent
        inherited_from: JVM
      sourcetype:
        source: inherited
        defined_in: BaseEvent
        inherited_from: JVM
      synch_supported:
        source: declared
        defined_in: Threading
        type: boolean
        description: Indicates whether the JVM supports monitoring of ownable synchronizer usage.
        expected_values:
        - 'true'
        - 'false'
        - '1'
        - '0'
      tag:
        source: inherited
        defined_in: JVM
        inherited_from: JVM
        type: string
        description: This automatically generated field is used to access tags from within data models. Add-on builders do not need to populate it.
        multivalue: true
      thread_count:
        source: declared
        defined_in: Threading
        type: number
        description: The JVM's current thread count.
      threads_started:
        source: declared
        defined_in: Threading
        type: number
        description: The total number of threads started in the JVM.
    inherits:
    - BaseEvent
    - JVM
  Runtime:
