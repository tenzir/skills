name: answer_count
used_by:
- model: Network_Resolution
  dataset: DNS
  source: calculated
  type: number
  description: Number of entries in the answer section of the DNS message.
  calculation:
    id: DNS_answer_count
    type: Eval
    expression: case(isnum(answer_count),answer_count,isnotnull(answer),mvcount(answer),1=1,1)
