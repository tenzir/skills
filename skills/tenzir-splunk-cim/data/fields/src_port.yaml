name: src_port
used_by:
- model: Certificates
  dataset: All_Certificates
  source: declared
  type: number
  description: The port number of the source.
- model: Endpoint
  dataset: Ports
  source: calculated
  type: number
  description: The "remote" port connected to the listening port (if applicable).
  recommended: true
  calculation:
    id: Endpoint_Ports_fillnull_src_port
    type: Eval
    expression: if(isnum(src_port),src_port,0)
- model: Intrusion_Detection
  dataset: IDS_Attacks
  source: declared
  type: number
  description: The port number of the source.
  multivalue: true
- model: Network_Resolution
  dataset: DNS
  source: declared
  type: number
  description: The port number of the source.
  multivalue: true
- model: Network_Traffic
  dataset: All_Traffic
  source: calculated
  type: string
  description: 'The source port of the network traffic. Note: Do not translate the value of this field to a string (tcp/80 is 80, not http). You can set up the corresponding string value in the src_svc field.'
  recommended: true
  calculation:
    id: All_Traffic_fillnull_src_port
    type: Eval
    expression: if(isnum(src_port),src_port,0)
- model: Splunk_CIM_Validation
  dataset: Missing_Extractions_Network_Traffic
  source: declared
  type: number
