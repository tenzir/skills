name: file_modify_time
used_by:
- model: Change_Analysis
  dataset: Filesystem_Changes
  source: calculated
  type: timestamp
  description: The time the file (the object of the event) was altered.
  recommended: true
  calculation:
    id: Filesystem_Changes_eval_file_modify_time
    type: Eval
    expression: if(isnull(file_modify_time) OR file_modify_time="",0,file_modify_time)
- model: Endpoint
  dataset: Filesystem
  source: declared
  type: timestamp
  description: The time the file (the object of the event) was altered.
  recommended: true
- model: Splunk_CIM_Validation
  dataset: Missing_Extractions_Filesystem_Changes
  source: declared
  type: number
