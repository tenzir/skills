name: user
used_by:
- model: Alerts
  dataset: Alerts
  kind: event
  source: calculated
  type: string
  description: The user involved in the alert event.
  recommended: true
  calculation:
    id: Alerts_fillnull_user
    type: Eval
    expression: if(isnull(user) OR user="","unknown",user)
- model: Application_State
  dataset: All_Application_State
  kind: event
  source: declared
  type: string
  description: The user account the service is running as, such as System or httpdsvc.
- model: Authentication
  dataset: Authentication
  kind: event
  source: calculated
  type: string
  description: The name of the user involved in the event, or who initiated the event. For authentication privilege escalation events this should represent the user targeted by the escalation.
  recommended: true
  calculation:
    id: Authentication_fillnull_user
    type: Eval
    expression: if(isnull(user) OR user="","unknown",user)
- model: Change
  dataset: All_Changes
  kind: event
  source: calculated
  type: string
  description: The user or entity performing the change. For account changes, this is the account that was changed (see src_user for user or entity performing the change).
  recommended: true
  calculation:
    id: All_Changes_fillnull_user
    type: Eval
    expression: if(isnull(user) OR user="","unknown",user)
- model: Change_Analysis
  dataset: All_Changes
  kind: event
  source: calculated
  type: string
  description: The user or entity performing the change. For account changes, this is the account that was changed (see src_user for user or entity performing the change).
  recommended: true
  calculation:
    id: All_Changes_fillnull_user
    type: Eval
    expression: if(isnull(user) OR user="","unknown",user)
- model: Compute_Inventory
  dataset: User
  kind: event
  source: calculated
  type: string
  description: The full name of a locally defined account.
  recommended: true
  calculation:
    id: User_user
    type: Eval
    expression: if(isnull(user) OR user="","unknown",user)
- model: Data_Access
  dataset: Data_Access
  kind: event
  source: calculated
  type: string
  description: The user involved in the event, or who initiated the event.
  recommended: true
  calculation:
    id: All_Changes_fillnull_user
    type: Eval
    expression: if(isnull(user) OR user="","unknown",user)
- model: Databases
  dataset: All_Databases
  kind: event
  source: declared
  type: string
  description: Name of the database process user.
- model: DLP
  dataset: DLP_Incidents
  kind: event
  source: calculated
  type: string
  description: The target user of the DLP event.
  recommended: true
  calculation:
    id: DLP_Incidents_fillnull_user
    type: Eval
    expression: if(isnull(user) OR user="","unknown",user)
- model: Email
  dataset: All_Email
  kind: event
  source: declared
  type: string
  description: The user context for the process. This is not the email address for the sender. For that, use the src_user field.
- model: Endpoint
  dataset: Filesystem
  kind: search
  source: calculated
  type: string
  description: The user account associated with the filesystem access.
  recommended: true
  calculation:
    id: Endpoint_Filesystem_fillnull_user
    type: Eval
    expression: if(isnull(user) OR user="","unknown",user)
- model: Endpoint
  dataset: Ports
  kind: search
  source: calculated
  type: string
  description: The user account associated with the listening port.
  recommended: true
  calculation:
    id: Endpoint_Ports_fillnull_user
    type: Eval
    expression: if(isnull(user) OR user="","unknown",user)
- model: Endpoint
  dataset: Processes
  kind: search
  source: calculated
  type: string
  description: The current user linked to the running process.
  recommended: true
  calculation:
    id: Endpoint_Processes_fillnull_user
    type: Eval
    expression: if(isnull(user) OR user="","unknown",user)
- model: Endpoint
  dataset: Registry
  kind: search
  source: calculated
  type: string
  description: The user account associated with the registry access.
  recommended: true
  calculation:
    id: Endpoint_Registry_fillnull_user
    type: Eval
    expression: if(isnull(user) OR user="","unknown",user)
- model: Endpoint
  dataset: Services
  kind: search
  source: calculated
  type: string
  description: The user account associated with the service.
  recommended: true
  calculation:
    id: Endpoint_Services_fillnull_user
    type: Eval
    expression: if(isnull(user) OR user="","unknown",user)
- model: Intrusion_Detection
  dataset: IDS_Attacks
  kind: event
  source: calculated
  type: string
  description: The user involved with the intrusion detection event.
  recommended: true
  calculation:
    id: IDS_Attacks_fillnull_user
    type: Eval
    expression: if(isnull(user) OR user="","unknown",user)
- model: Malware
  dataset: Malware_Attacks
  kind: event
  source: calculated
  type: string
  description: The user involved in the malware event.
  recommended: true
  calculation:
    id: Malware_Attacks_fillnull_user
    type: Eval
    expression: if(isnull(user) OR user="","unknown",user)
- model: Network_Sessions
  dataset: All_Sessions
  kind: event
  source: calculated
  type: string
  description: The user in a network session event, where applicable. For example, a VPN session or an authenticated DHCP event.
  recommended: true
  calculation:
    id: All_Sessions_fillnull_user
    type: Eval
    expression: if(isnull(user) OR user="","unknown",user)
- model: Network_Traffic
  dataset: All_Traffic
  kind: event
  source: calculated
  type: string
  description: The user that requested the traffic flow.
  recommended: true
  calculation:
    id: All_Traffic_fillnull_user
    type: Eval
    expression: if(isnull(user) OR user="","unknown",user)
- model: Splunk_Audit
  dataset: Modular_Actions
  kind: event
  source: calculated
  type: string
  description: The user who triggered an ad hoc alert. Not relevant for actions triggered by searches.
  calculation:
    id: Modular_Actions_user_or_owner
    type: Eval
    expression: if(isnotnull(user) AND user!="",user,owner)
- model: Splunk_Audit
  dataset: Scheduler_Activity
  kind: search
  source: declared
  type: string
  description: The user who scheduled the search.
- model: Splunk_Audit
  dataset: Search_Activity
  kind: event
  source: calculated
  type: string
  description: The name of the user who ran the search.
  calculation:
    id: 0Search_Activity_user
    type: Rex
    expression: user=(?<user>[^,]+), action
    input_field: _raw
- model: Splunk_Audit
  dataset: View_Activity
  kind: event
  source: declared
  type: string
  description: The username of the user who accessed the view.
