name: ssl_issuer_email_domain
used_by:
- model: Certificates
  dataset: SSL
  kind: event
  source: calculated
  type: string
  description: The domain name contained within the certificate issuer's email address.
  recommended: true
  calculation:
    id: SSL_ssl_issuer_email_domain
    type: Rex
    expression: ^.*@(?<ssl_issuer_email_domain>.+)$
    input_field: ssl_issuer_email
