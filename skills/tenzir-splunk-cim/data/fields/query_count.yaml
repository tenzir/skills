name: query_count
used_by:
- model: Network_Resolution
  dataset: DNS
  kind: event
  source: calculated
  type: number
  description: Number of entries that appear in the 'Questions' section of the DNS query.
  calculation:
    id: DNS_query_count
    type: Eval
    expression: case(isnum(query_count),query_count,isnotnull(query),mvcount(query),1=1,1)
