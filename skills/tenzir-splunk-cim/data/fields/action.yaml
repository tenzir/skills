- model: Authentication
  dataset: Authentication
  source: calculated
  type: string
  description: The action performed on the resource.
  expected_values:
  - success
  - failure
  - pending
  - error
  recommended: true
  calculation:
    id: Authentication_fillnull_action
    type: Eval
    expression: if(isnull(action) OR action="","unknown",action)
