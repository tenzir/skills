name: dest_ip
used_by:
- model: Compute_Inventory
  dataset: Network
  kind: event
  source: declared
  type: string
  description: The IP address for the system that the data is going to.
- model: Intrusion_Detection
  dataset: IDS_Attacks
  kind: event
  source: declared
  type: string
  description: The IP address of the destination.
- model: Malware
  dataset: Malware_Attacks
  kind: event
  source: declared
  type: string
  description: The IP address of the destination.
- model: Malware
  dataset: Malware_Operations
  kind: search
  source: declared
  type: string
  description: The IP address of the destination.
- model: Network_Resolution
  dataset: DNS
  kind: event
  source: declared
  type: string
  description: The IP address of the destination.
- model: Network_Sessions
  dataset: All_Sessions
  kind: event
  source: calculated
  type: string
  description: The internal IP address allocated to the client initializing a network session. For DHCP and VPN events, this is the IP address leased to the client.
  recommended: true
  calculation:
    id: All_Sessions_fillnull_dest_ip
    type: Eval
    expression: case(source LIKE "stream%" AND isnotnull(yiaddr) AND yiaddr!="",yiaddr,isnull(dest_ip) OR dest_ip="","unknown",1=1,dest_ip)
- model: Network_Traffic
  dataset: All_Traffic
  kind: event
  source: declared
  type: string
  description: The IP address of the destination.
- model: Splunk_CIM_Validation
  dataset: Missing_Extractions_Network_Sessions
  kind: search
  source: declared
  type: string
- model: Web
  dataset: Web
  kind: event
  source: declared
  type: string
  description: The IP address of the destination.
