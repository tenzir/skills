name: ssl_subject
used_by:
- model: Certificates
  dataset: SSL
  kind: event
  source: calculated
  type: string
  description: The certificate owner's RFC2253 Distinguished Name.
  recommended: true
  calculation:
    id: SSL_fillnull_ssl_subject
    type: Eval
    expression: if(isnull(ssl_subject) OR ssl_subject="","unknown",ssl_subject)
- model: Splunk_CIM_Validation
  dataset: Missing_Extractions_Certificates
  kind: search
  source: declared
  type: string
