name: severity
lookups:
- name: cim_endpoint_severities
  file: data/lookups/cim_endpoint_severities.yaml
- name: cim_ids_severities
  file: data/lookups/cim_ids_severities.yaml
- name: cim_vuln_severities
  file: data/lookups/cim_vuln_severities.yaml
used_by:
- model: Alerts
  dataset: Alerts
  source: calculated
  type: string
  description: 'The severity of the alert event. Note: This field is a string. Specific values are required. Use the severity_id field for severity ID fields that are integer data types. Use vendor_severity for the vendor''s own human readable strings (such as ''Good'', ''Bad'', ''Really Bad'').'
  expected_values:
  - critical
  - high
  - medium
  - low
  - informational
  - unknown
  recommended: true
  calculation:
    id: Alerts_fillnull_severity
    type: Eval
    expression: if(isnull(severity) OR severity="","unknown",severity)
