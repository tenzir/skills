name: change_type
used_by:
- model: Change
  dataset: All_Changes
  kind: event
  source: calculated
  type: string
  description: The type of change, such as filesystem or AAA (authentication, authorization, and accounting).
  recommended: true
  calculation:
    id: All_Changes_fillnull_change_type
    type: Eval
    expression: if(isnull(change_type) OR change_type="","unknown",change_type)
- model: Change_Analysis
  dataset: All_Changes
  kind: event
  source: calculated
  type: string
  description: The type of change, such as filesystem or AAA (authentication, authorization, and accounting).
  expected_values:
  - restart
  recommended: true
  calculation:
    id: All_Changes_fillnull_change_type
    type: Eval
    expression: if(isnull(change_type) OR change_type="","unknown",change_type)
