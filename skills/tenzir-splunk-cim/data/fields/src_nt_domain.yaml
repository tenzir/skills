name: src_nt_domain
used_by:
- model: Authentication
  dataset: Authentication
  kind: event
  source: declared
  type: string
  description: The name of the Active Directory used by the authentication source, if applicable.
- model: Change
  dataset: Account_Management
  kind: event
  source: calculated
  type: string
  description: The NT domain of the source, if applicable.
  recommended: true
  calculation:
    id: Account_Management_fillnull_src_nt_domain
    type: Eval
    expression: if(isnull(src_nt_domain) OR src_nt_domain="","unknown",src_nt_domain)
- model: Change_Analysis
  dataset: Account_Management
  kind: event
  source: calculated
  type: string
  description: The NT domain of the source, if applicable.
  recommended: true
  calculation:
    id: Account_Management_fillnull_src_nt_domain
    type: Eval
    expression: if(isnull(src_nt_domain) OR src_nt_domain="","unknown",src_nt_domain)
