used_by:
- model: Application_State
  dataset: Services
  source: calculated
  type: string
  description: The status of the service.
  expected_values:
  - critical
  - started
  - stopped
  - warning
  recommended: true
  calculation:
    id: Services_fillnull_status
    type: Eval
    expression: if(isnull(status) OR status="","unknown",status)
