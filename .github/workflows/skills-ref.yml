name: Validate Skills

on:
  pull_request:
    paths:
      - "AGENTS.md"
      - ".github/workflows/**"
      - "scripts/**"
      - "skills/**"
      - ".claude-plugin/**"
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  actionlint:
    name: Lint Workflows
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Run actionlint
        uses: docker://rhysd/actionlint:1.7.8

  validate:
    name: Validate Skills
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install skills-ref
        shell: bash
        run: uv tool install git+https://github.com/agentskills/agentskills.git#subdirectory=skills-ref

      - name: Validate skills with skills-ref
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t skill_dirs < <(
            find skills -name SKILL.md -print | sed 's#/SKILL.md$##' | sort
          )

          for skill_dir in "${skill_dirs[@]}"; do
            echo "Validating ${skill_dir}"
            skills-ref validate "${skill_dir}"
          done

      - name: Validate marketplace.json
        shell: bash
        run: |
          set -euo pipefail
          
          local_skills=$(mktemp)
          marketplace_skills=$(mktemp)
          
          find skills -name SKILL.md -print | sed 's#/SKILL.md$##' | sort | sed 's#^#./#' > "$local_skills"
          jq -r '.plugins[].skills[]' .claude-plugin/marketplace.json | sort > "$marketplace_skills"
          
          duplicates=$(uniq -d < "$marketplace_skills")
          if [[ -n "${duplicates}" ]]; then
            echo "Error: Found duplicate skills in marketplace.json:"
            echo "${duplicates}"
            exit 1
          fi
          
          if ! cmp -s "$local_skills" "$marketplace_skills"; then
            echo "Error: Mismatch between skills directories and marketplace.json!"
            echo "Differences (skills/ vs marketplace.json):"
            diff -u "$local_skills" "$marketplace_skills" || true
            exit 1
          fi
          
          echo "marketplace.json is valid."
