name: Sync EDM Skill

on:
  workflow_dispatch:
    inputs:
      version:
        description: "FortiSIEM Event Data Model document version to build from"
        required: false
        default: "7.5.0"
        type: string
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: write

concurrency:
  group: "sync-edm-skill"
  cancel-in-progress: false

jobs:
  sync:
    name: Rebuild tenzir-edm
    runs-on: ubuntu-latest

    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.TENZIR_GITHUB_APP_ID }}
          private-key: ${{ secrets.TENZIR_GITHUB_APP_PRIVATE_KEY }}
          owner: tenzir

      - name: Check out repository
        uses: actions/checkout@v5
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Rebuild EDM skill
        env:
          FORTISIEM_VERSION: ${{ github.event.inputs['version'] || '7.5.0' }}
        shell: bash
        run: |
          set -euo pipefail

          uv run scripts/generate-fortisiem-skill.py \
            --output-dir skills/tenzir-edm \
            --version "$FORTISIEM_VERSION"

      - name: Validate skills
        shell: bash
        run: scripts/validate-skills

      - name: Stage changes
        shell: bash
        run: |
          set -euo pipefail
          git add -A -- skills/tenzir-edm

      - name: Commit changes
        uses: planetscale/ghcommit-action@v0.2.0
        with:
          commit_message: "Sync tenzir-edm from Fortinet FortiSIEM docs"
          repo: ${{ github.repository }}
          branch: ${{ github.ref_name }}
          empty: false
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
