name: Sync Tenzir Docs Skill

on:
  schedule:
    # Daily; the docs deploy continuously via Cloudflare, so a daily pull
    # keeps the skill fresh without cross-repo plumbing.
    - cron: "0 5 * * *"
  workflow_dispatch:
    inputs:
      base_url:
        description: "Site to sync the documentation from"
        required: false
        default: "https://tenzir.com"
        type: string

permissions:
  contents: write

concurrency:
  group: "sync-docs-skill"
  cancel-in-progress: false

jobs:
  sync:
    name: Rebuild tenzir-docs
    runs-on: ubuntu-latest

    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.TENZIR_GITHUB_APP_ID }}
          private-key: ${{ secrets.TENZIR_GITHUB_APP_PRIVATE_KEY }}
          owner: tenzir

      - name: Check out repository
        uses: actions/checkout@v5
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Download docs pages
        shell: bash
        env:
          BASE_URL: ${{ inputs.base_url || 'https://tenzir.com' }}
        run: |
          set -euo pipefail

          base="${BASE_URL%/}"
          mkdir -p /tmp/tenzir-docs
          curl -fsSL --retry 3 --retry-all-errors -o /tmp/llms.txt "$base/llms.txt"

          # llms.txt is the manifest: every documentation page appears as a
          # markdown link. The generator expects the docs-map heading tree
          # the old docs site served as sitemap.md, so convert first. Docs
          # pages live under /docs/ on the website but at the tree root for
          # the skill generator; integration pages keep their integrations/
          # prefix. Skip the changelog and pages outside the docs tree.
          uv run scripts/llms-txt-to-docs-map.py /tmp/llms.txt /tmp/tenzir-docs/sitemap.md

          grep -oE "$base/[A-Za-z0-9./_-]+\.md" /tmp/tenzir-docs/sitemap.md \
            | sort -u > /tmp/urls.txt

          download() {
            local url="$1" path
            path="${url#"$base"/}"
            case "$path" in
              docs/*) path="${path#docs/}" ;;
              integrations/*) ;;
              *) return 0 ;;
            esac
            mkdir -p "/tmp/tenzir-docs/$(dirname "$path")"
            curl -fsSL --retry 3 --retry-all-errors \
              -o "/tmp/tenzir-docs/$path" "$url"
          }
          export -f download
          export base

          xargs -P 8 -n 1 -I {} bash -c 'download "$@"' _ {} < /tmp/urls.txt
          echo "Downloaded $(find /tmp/tenzir-docs -name '*.md' | wc -l) pages"

      - name: Rebuild tenzir-docs skill
        shell: bash
        run: |
          set -euo pipefail
          uv run scripts/generate-tenzir-docs-skill.py \
            --input-dir /tmp/tenzir-docs \
            --output-dir skills/tenzir-docs

      - name: Validate skills
        shell: bash
        run: scripts/validate-skills

      - name: Stage changes
        shell: bash
        run: |
          set -euo pipefail
          git add -A -- skills/tenzir-docs

      - name: Commit changes
        uses: planetscale/ghcommit-action@v0.2.0
        with:
          commit_message: "Sync tenzir-docs from ${{ inputs.base_url || 'https://tenzir.com' }}"
          repo: ${{ github.repository }}
          branch: ${{ github.ref_name }}
          empty: false
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
