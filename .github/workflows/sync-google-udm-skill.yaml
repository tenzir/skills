name: Sync Google UDM Skill

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "googleapis/googleapis ref to build from"
        required: false
        default: "master"
        type: string
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: write

concurrency:
  group: "sync-google-udm-skill"
  cancel-in-progress: false

jobs:
  sync:
    name: Rebuild tenzir-google-udm
    runs-on: ubuntu-latest

    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.TENZIR_GITHUB_APP_ID }}
          private-key: ${{ secrets.TENZIR_GITHUB_APP_PRIVATE_KEY }}
          owner: tenzir

      - name: Check out repository
        uses: actions/checkout@v5
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Rebuild Google UDM skill
        env:
          UDM_REF: ${{ github.event.inputs.ref || 'master' }}
        shell: bash
        run: |
          set -euo pipefail

          uv run scripts/generate-google-udm-skill.py \
            --output-dir skills/tenzir-google-udm \
            --ref "$UDM_REF"

      - name: Validate skills
        shell: bash
        run: scripts/validate-skills

      - name: Stage changes
        shell: bash
        run: |
          set -euo pipefail
          git add -A -- skills/tenzir-google-udm

      - name: Commit changes
        uses: planetscale/ghcommit-action@v0.2.0
        with:
          commit_message: "Sync tenzir-google-udm from upstream schema"
          repo: ${{ github.repository }}
          branch: ${{ github.ref_name }}
          empty: false
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
