name: Sync ECS Skill

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Elastic ECS stable release tag to build from"
        required: false
        default: ""
        type: string
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: write

concurrency:
  group: "sync-ecs-skill"
  cancel-in-progress: false

jobs:
  sync:
    name: Rebuild tenzir-ecs
    runs-on: ubuntu-latest

    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.TENZIR_GITHUB_APP_ID }}
          private-key: ${{ secrets.TENZIR_GITHUB_APP_PRIVATE_KEY }}
          owner: tenzir

      - name: Check out repository
        uses: actions/checkout@v5
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Rebuild Elastic ECS skill
        env:
          ECS_REF: ${{ github.event.inputs.ref || '' }}
        shell: bash
        run: |
          set -euo pipefail

          args=(--output-dir skills/tenzir-ecs)
          if [[ -n "$ECS_REF" ]]; then
            args+=(--ref "$ECS_REF")
          fi

          uv run scripts/generate-ecs-skill.py "${args[@]}"

      - name: Validate skills
        shell: bash
        run: scripts/validate-skills

      - name: Stage changes
        shell: bash
        run: |
          set -euo pipefail
          git add -A -- skills/tenzir-ecs

      - name: Commit changes
        uses: planetscale/ghcommit-action@v0.2.0
        with:
          commit_message: "Sync tenzir-ecs from upstream schema"
          repo: ${{ github.repository }}
          branch: ${{ github.ref_name }}
          empty: false
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
