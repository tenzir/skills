pre-push:
  parallel: true
  commands:
    validate-skills:
      run: scripts/validate-skills --marketplace
    validate-changelog:
      run: uvx tenzir-ship --root changelog validate
    test-google-udm-generator:
      run: >-
        uv run
        --with 'beautifulsoup4>=4.12.0'
        --with 'grpcio-tools>=1.64.0'
        --with 'httpx>=0.28.0'
        --with 'protobuf>=5.27.0'
        python -m unittest tests.test_generate_google_udm_skill
